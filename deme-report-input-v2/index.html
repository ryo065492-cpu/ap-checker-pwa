<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>作業日報入力 UI</title>
<style>
:root{--bg:#f3f5f7;--card:#fff;--ink:#111827;--sub:#667085;--line:#d0d5dd;--main:#14532d;--main2:#166534;--soft:#ecfdf3;--warn:#b54708;--warnbg:#fffaeb;--bad:#b42318;--badbg:#fef3f2;--blue:#175cd3;--bluebg:#eff8ff;--shadow:0 8px 22px rgba(16,24,40,.08);--r:16px}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#d8dde4;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;font-size:15px;line-height:1.45}button,input,select,textarea{font:inherit}button{cursor:pointer}.phone{min-height:100dvh;background:var(--bg);padding-bottom:calc(70px + env(safe-area-inset-bottom))}.top{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 10px) 14px 10px}.topRow{display:flex;align-items:center;justify-content:space-between;gap:10px}.top h1{font-size:18px;margin:0}.top p{font-size:12px;color:var(--sub);margin:1px 0 0}.mark{width:32px;height:32px;border-radius:10px;background:var(--main);color:#fff;display:grid;place-items:center;font-weight:900}.brand{display:flex;align-items:center;gap:9px}.wrap{max-width:520px;margin:0 auto;padding:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.title{font-weight:900;font-size:16px;margin:0 0 8px}.sub{font-size:12px;color:var(--sub)}.row{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.field{display:grid;gap:5px;margin-bottom:10px}.field label{font-size:12px;color:#344054;font-weight:850}.input,select,textarea{width:100%;min-height:48px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;color:var(--ink);padding:11px;outline:none}textarea{min-height:92px;resize:vertical}.btn{border:1px solid var(--line);background:#fff;color:#1f2937;border-radius:12px;min-height:46px;padding:10px 12px;font-weight:850}.btn.primary{background:var(--main);border-color:var(--main);color:#fff}.btn.dark{background:#111827;border-color:#111827;color:#fff}.btn.sm{min-height:34px;border-radius:10px;padding:6px 9px;font-size:12px}.btn.danger{color:var(--bad);border-color:#fecdca;background:#fff}.pill{display:inline-flex;align-items:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800;color:#344054;white-space:nowrap}.ok{background:var(--soft);border-color:#bbf7d0;color:var(--main2)}.warn{background:var(--warnbg);border-color:#fedf89;color:var(--warn)}.bad{background:var(--badbg);border-color:#fecdca;color:var(--bad)}.blue{background:var(--bluebg);border-color:#b2ddff;color:var(--blue)}.chips{display:flex;gap:8px;overflow:auto;padding:1px 0 3px}.chip{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-size:14px;font-weight:850}.chip.on{background:#111827;color:#fff;border-color:#111827}.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px}.stat strong{display:block;font-size:22px;line-height:1}.stat span{font-size:11px;color:var(--sub)}.dateControl{display:grid;grid-template-columns:42px 1fr 42px;gap:8px;align-items:end}.dateControl button{min-height:48px;border-radius:12px}.saveBar{position:sticky;bottom:0;background:linear-gradient(rgba(255,255,255,.85),#fff 35%);padding-top:10px;margin-top:10px}.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:#fff;border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -8px 22px rgba(16,24,40,.08)}.nav button{border:0;background:#fff;border-radius:12px;min-height:52px;color:#667085;font-size:11px;font-weight:900}.nav button span{display:block;font-size:18px;line-height:1.05;margin-bottom:3px}.nav button.on{background:var(--soft);color:var(--main2)}.tableList{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff}.rrow{display:grid;grid-template-columns:42px 1fr 68px 54px;gap:8px;align-items:center;min-height:48px;padding:8px 10px;border-bottom:1px solid #eaecf0}.rrow:last-child{border-bottom:0}.rrow.head{background:#f8fafc;font-size:12px;color:#475467;font-weight:850;min-height:38px}.day{font-weight:900}.work{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.mini{font-size:12px;color:var(--sub)}.drawer{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:50;display:none;align-items:flex-end}.drawer.on{display:flex}.panel{width:100%;max-height:90dvh;overflow:auto;background:#fff;border-radius:22px 22px 0 0;padding:14px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -10px 30px rgba(15,23,42,.2)}.handle{width:46px;height:5px;border-radius:99px;background:#d0d5dd;margin:0 auto 12px}.toast{position:fixed;left:12px;right:12px;bottom:calc(74px + env(safe-area-inset-bottom));z-index:60;background:#111827;color:#fff;border-radius:12px;padding:12px 14px;display:none}.toast.on{display:block}.sheetBox{overflow:auto;border:1px solid #98a2b3;border-radius:12px;background:#fff}.sheet{border-collapse:collapse;min-width:620px;width:100%;font-size:12px}.sheet th,.sheet td{border:1px solid #98a2b3;padding:5px}.sheet th{background:#eef2f6}.sheet .total td{background:#fff3bf;font-weight:900}.empty{text-align:center;color:var(--sub);border:1px dashed #cbd5e1;border-radius:14px;background:#fff;padding:18px}.notice{border:1px solid #bbf7d0;border-left:5px solid var(--main);background:#f6fef9;border-radius:13px;padding:11px;margin-bottom:12px}.search{display:flex;gap:8px}.filter{display:flex;gap:8px;overflow:auto;margin:10px 0}.filter button{white-space:nowrap}.compactCard{border:1px solid var(--line);border-radius:14px;background:#fff;padding:11px;margin-bottom:8px}.section{margin-top:8px}@media(min-width:720px){.phone{width:390px;min-height:820px;margin:18px auto;border:8px solid #111827;border-radius:34px;overflow:hidden;position:relative}.nav{left:50%;right:auto;transform:translateX(-50%);width:390px;border-radius:0 0 25px 25px}.toast{left:calc(50% - 183px);right:calc(50% - 183px)}}@media print{body{background:#fff}.phone{width:auto!important;border:0!important;margin:0!important;padding:0}.top,.nav,.drawer,.toast,.btn,.filter,.search{display:none!important}.wrap{max-width:none;padding:0}.card{box-shadow:none;border:0}.sheet{min-width:0;font-size:10px}}
</style>
</head>
<body>
<div class="phone">
<header class="top"><div class="topRow"><div class="brand"><div class="mark">日</div><div><h1 id="ttl">日報入力</h1><p id="sub">その日の紙日報をそのまま入力</p></div></div><button class="btn sm" onclick="openContext()">現場/月</button></div></header>
<main class="wrap" id="app"></main>
<nav class="nav" id="nav"></nav>
<div class="drawer" id="drawer" onclick="if(event.target.id==='drawer')closePanel()"><div class="panel"><div class="handle"></div><div id="panel"></div></div></div>
<div class="toast" id="toast"></div>
</div>
<script>
const KEY='deme-report-input-v2';
const today=new Date();
const ym=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
const seed={tab:'input',job:'j1',month:'2026-06',day:today.getDate(),filter:'entered',jobs:[{id:'j1',name:'青葉マンション改修工事',client:'青葉建設'},{id:'j2',name:'南町ビル設備更新',client:'南町開発'}],reports:[{day:1,job:'j1',content:'共用部配線・既設確認',labor:2,overtime:1,car:1,distance:18,note:'2名対応'},{day:2,job:'j1',content:'器具取付',labor:1.5,overtime:0,car:1,distance:18,note:''},{day:4,job:'j1',content:'盤まわり確認',labor:1,overtime:.5,car:0,distance:0,note:'午後から'}],masters:{labor:[0.5,1,1.5,2,2.5,3],ot:[0,0.5,1,1.5,2,3]}};
let db=JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(seed);let dirty=false;const $=id=>document.getElementById(id);const save=()=>localStorage.setItem(KEY,JSON.stringify(db));
function job(){return db.jobs.find(j=>j.id===db.job)||db.jobs[0]}function dim(){let [y,m]=db.month.split('-').map(Number);return new Date(y,m,0).getDate()}function list(){return db.reports.filter(r=>r.job===db.job).sort((a,b)=>a.day-b.day)}function rec(day=db.day){return db.reports.find(r=>r.job===db.job&&r.day===day)||null}function sums(){return list().reduce((a,r)=>{a.labor+=+r.labor||0;a.ot+=+r.overtime||0;a.car+=+r.car||0;a.dist+=+r.distance||0;return a},{labor:0,ot:0,car:0,dist:0,get work(){return this.labor*8}})}function entered(){return new Set(list().map(r=>r.day))}function missingCount(){let s=entered(),n=0;for(let i=1;i<=dim();i++)if(!s.has(i))n++;return n}function toast(t){$('toast').textContent=t;$('toast').classList.add('on');setTimeout(()=>$('toast').classList.remove('on'),1500)}function closePanel(){$('drawer').classList.remove('on')}function setTitle(t,s){$('ttl').textContent=t;$('sub').textContent=s||''}
function nav(){const a=[['input','入力','✎'],['list','一覧','☰'],['monthly','月表','表'],['summary','出面','集']];$('nav').innerHTML=a.map(x=>`<button class="${db.tab===x[0]?'on':''}" onclick="go('${x[0]}')"><span>${x[2]}</span>${x[1]}</button>`).join('')}function go(t){if(t!==db.tab&&dirty&&!confirm('未保存の入力があります。移動しますか？'))return;db.tab=t;dirty=false;save();render()}function openContext(){let j=job();$('panel').innerHTML=`<div class="title">現場・月を変更</div><div class="field"><label>現場</label><select id="ctx_job">${db.jobs.map(x=>`<option value="${x.id}" ${x.id===db.job?'selected':''}>${x.name}</option>`).join('')}</select></div><div class="field"><label>対象月</label><input id="ctx_month" class="input" type="month" value="${db.month}"></div><div class="notice"><b>現在</b><br><span class="sub">${j.name} / ${db.month}</span></div><button class="btn primary" style="width:100%" onclick="db.job=$('ctx_job').value;db.month=$('ctx_month').value;save();closePanel();render();toast('変更しました')">変更する</button>`;$('drawer').classList.add('on')}
function dayISO(day){return `${db.month}-${String(day).padStart(2,'0')}`}function setDayFromDate(v){let d=Number(v.split('-')[2]);db.day=d;save();render()}function changeDay(delta){let d=db.day+delta;if(d<1)d=1;if(d>dim())d=dim();db.day=d;save();render()}function setToday(){let now=new Date();let m=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;db.month=m;db.day=now.getDate();save();render()}
function input(){setTitle('日報入力','その日の分を入力・修正');let r=rec()||{day:db.day,job:db.job,content:'',labor:1,overtime:0,car:0,distance:0,note:''};let exists=!!rec();return `<div class="card"><div class="row between"><div><div class="title" style="margin:0">${job().name}</div><div class="sub">${db.month}</div></div><span class="pill ${exists?'ok':'warn'}">${exists?'保存済み':'未保存'}</span></div></div><div class="card"><div class="dateControl"><button class="btn" onclick="changeDay(-1)">‹</button><div class="field" style="margin:0"><label>入力する日付</label><input class="input" type="date" value="${dayISO(db.day)}" onchange="setDayFromDate(this.value)"></div><button class="btn" onclick="changeDay(1)">›</button></div><button class="btn sm" style="margin-top:8px" onclick="setToday()">今日に戻る</button></div><div class="card"><div class="field"><label>作業内容</label><textarea id="content" oninput="dirty=true" placeholder="例：共用部配線、器具取付">${r.content||''}</textarea></div><div class="field"><label>人工</label><div class="chips">${db.masters.labor.map(v=>`<button class="chip ${+r.labor===v?'on':''}" onclick="setChip('labor','${v}',this)">${v}</button>`).join('')}</div><input id="labor" type="hidden" value="${r.labor||1}"></div><div class="field"><label>残業H</label><div class="chips">${db.masters.ot.map(v=>`<button class="chip ${+r.overtime===v?'on':''}" onclick="setChip('ot','${v}',this)">${v}</button>`).join('')}</div><input id="ot" type="hidden" value="${r.overtime||0}"></div><div class="grid2"><div class="field"><label>車両</label><input id="car" class="input" type="number" value="${r.car||0}" oninput="dirty=true"></div><div class="field"><label>距離数 km</label><input id="dist" class="input" type="number" value="${r.distance||0}" oninput="dirty=true"></div></div><div class="field"><label>備考</label><input id="note" class="input" value="${r.note||''}" oninput="dirty=true"></div><div class="saveBar"><button class="btn primary" style="width:100%" onclick="saveReport()">${exists?'更新する':'保存する'}</button><div class="grid2" style="margin-top:8px"><button class="btn" onclick="copyPrev()">前日をコピー</button><button class="btn" onclick="go('list')">一覧を見る</button></div>${exists?`<button class="btn danger" style="width:100%;margin-top:8px" onclick="deleteReport()">この日を削除</button>`:''}</div></div>`}
function setChip(id,v,btn){$(id).value=v;dirty=true;btn.parentElement.querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));btn.classList.add('on')}function val(id){return $(id).value}function saveReport(){db.reports=db.reports.filter(r=>!(r.job===db.job&&r.day===db.day));db.reports.push({day:db.day,job:db.job,content:val('content'),labor:+val('labor'),overtime:+val('ot'),car:+val('car'),distance:+val('dist'),note:val('note')});dirty=false;save();toast('日報を保存しました');render()}function deleteReport(){if(!confirm(`${db.day}日の日報を削除しますか？`))return;db.reports=db.reports.filter(r=>!(r.job===db.job&&r.day===db.day));dirty=false;save();toast('削除しました');render()}function copyPrev(){let p=rec(db.day-1);if(!p){toast('前日の入力がありません');return}db.reports=db.reports.filter(r=>!(r.job===db.job&&r.day===db.day));db.reports.push({...p,day:db.day});dirty=false;save();toast('前日の内容をコピーしました');render()}
function listPage(){setTitle('日報一覧','月内の入力状況をまとめて確認');let s=sums();let data=[];let rmap=new Map(list().map(r=>[r.day,r]));if(db.filter==='entered'){data=list()}else{for(let d=1;d<=dim();d++)data.push(rmap.get(d)||{day:d,job:db.job,content:'',labor:'',overtime:'',empty:true})}return `<div class="card"><div class="row between"><div><div class="title" style="margin:0">${job().name}</div><div class="sub">${db.month}</div></div><button class="btn sm" onclick="openContext()">変更</button></div></div><div class="grid3"><div class="stat"><strong>${list().length}</strong><span>入力日</span></div><div class="stat"><strong>${s.labor}</strong><span>人工</span></div><div class="stat"><strong>${missingCount()}</strong><span>未入力</span></div></div><div class="filter"><button class="chip ${db.filter==='entered'?'on':''}" onclick="db.filter='entered';save();render()">入力済みだけ</button><button class="chip ${db.filter==='all'?'on':''}" onclick="db.filter='all';save();render()">未入力も表示</button><button class="chip" onclick="db.tab='input';db.day=1;save();render()">1日から入力</button></div><div class="tableList"><div class="rrow head"><div>日</div><div>作業内容</div><div>人工</div><div>残業</div></div>${data.map(r=>`<div class="rrow" onclick="db.day=${r.day};db.tab='input';save();render()"><div class="day">${r.day}</div><div class="work ${r.empty?'sub':''}">${r.empty?'未入力':(r.content||'作業内容なし')}</div><div>${r.empty?'-':r.labor}</div><div>${r.empty?'-':(r.overtime||0)}H</div></div>`).join('')||'<div class="empty">入力済みの日報がありません。</div>'}</div>`}
function monthly(){setTitle('月次作業日報','紙の月表に近い確認画面');let rows='',m=new Map(list().map(r=>[r.day,r]));for(let d=1;d<=dim();d++){let r=m.get(d)||{};rows+=`<tr><td>${d}</td><td>${job().name}</td><td>${r.content||''}</td><td>${r.labor||''}</td><td>${r.overtime||''}</td><td>${r.car||''}</td><td>${r.distance||''}</td><td>${r.note||''}</td></tr>`}let s=sums();rows+=`<tr class="total"><td>合計</td><td></td><td></td><td>${s.labor}</td><td>${s.ot}</td><td>${s.car}</td><td>${s.dist}</td><td></td></tr>`;return `<div class="card"><div class="row between"><div><div class="title" style="margin:0">${db.month} 作業日報</div><div class="sub">${job().name}</div></div><button class="btn sm" onclick="window.print()">PDF</button></div></div><div class="card"><div class="sheetBox"><table class="sheet"><thead><tr><th>日付</th><th>現場名</th><th>作業内容</th><th>人工</th><th>残業</th><th>車両</th><th>距離数</th><th>備考</th></tr></thead><tbody>${rows}</tbody></table></div></div>`}
function summary(){setTitle('出面集計','月末提出前の確認');let rows='',m=new Map(list().map(r=>[r.day,r]));for(let d=1;d<=dim();d++){let r=m.get(d)||{},l=+r.labor||0;rows+=`<tr><td>${d}</td><td>${l||''}</td><td>${l?l*8:''}</td><td>${r.overtime||''}</td><td></td></tr>`}let s=sums();rows+=`<tr class="total"><td>集計</td><td>${s.labor}</td><td>${s.work}</td><td>${s.ot}</td><td></td></tr>`;return `<div class="grid3"><div class="stat"><strong>${s.labor}</strong><span>人工</span></div><div class="stat"><strong>${s.work}</strong><span>勤務H</span></div><div class="stat"><strong>${s.ot}</strong><span>残業H</span></div></div><div class="card"><div class="row between"><div class="title">出面表</div><button class="btn sm" onclick="window.print()">PDF</button></div><div class="sheetBox"><table class="sheet"><thead><tr><th>月日</th><th>人工数</th><th>勤務時間</th><th>残業</th><th>深夜残業</th></tr></thead><tbody>${rows}</tbody></table></div></div>`}
function render(){nav();const pages={input,list:listPage,monthly,summary};$('app').innerHTML=pages[db.tab]()}render();
</script>
</body>
</html>
