<!doctype html>
<html lang='ja'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'>
<title>出面・日報・名簿アプリ 試作</title>
<style>
:root{--bg:#f5f6f8;--card:#fff;--ink:#1f2937;--muted:#6b7280;--line:#d9dde3;--main:#17694f;--main2:#0e4f3c;--soft:#eef7f3;--warn:#9a5d00;--danger:#b42318}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,sans-serif;font-size:15px}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{min-height:100dvh;padding-bottom:82px}.top{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 10px) 16px 10px}.top h1{margin:0;font-size:18px}.top p{margin:2px 0 0;color:var(--muted);font-size:12px}.main{padding:14px 14px 24px;max-width:520px;margin:0 auto}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}.ttl{font-weight:700;font-size:16px;margin:0 0 10px}.muted{color:var(--muted)}.small{font-size:12px}.row{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stack{display:grid;gap:10px}.field{display:grid;gap:5px}.field label{font-size:12px;font-weight:700;color:#374151}.inp,select,textarea{width:100%;min-height:46px;border:1px solid #cfd4dc;border-radius:10px;background:#fff;padding:10px;color:var(--ink)}textarea{min-height:78px;resize:vertical}.btn{border:1px solid var(--line);background:#fff;border-radius:10px;min-height:46px;padding:9px 12px;font-weight:700;color:var(--ink)}.btn.main{background:var(--main);border-color:var(--main);color:#fff}.btn.dark{background:#111827;border-color:#111827;color:#fff}.btn.warn{color:var(--danger);border-color:#efc7c3}.btn.sm{min-height:34px;font-size:13px;padding:6px 9px}.pill{display:inline-flex;border:1px solid var(--line);background:#f9fafb;border-radius:999px;padding:3px 8px;font-size:12px;color:#374151}.pill.ok{color:var(--main2);background:var(--soft);border-color:#b9decf}.pill.warn{color:var(--warn);background:#fff8e6;border-color:#edcf82}.list{display:grid;gap:8px}.item{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}.item:active{background:#f8fafc}.nav{position:fixed;left:0;right:0;bottom:0;z-index:20;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:#fff;border-top:1px solid var(--line);padding:6px 6px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 18px rgba(0,0,0,.06)}.nav button{border:0;background:#fff;border-radius:12px;min-height:54px;color:#4b5563;font-size:12px;font-weight:700}.nav button.on{color:var(--main);background:var(--soft)}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}.num{font-size:21px;font-weight:800}.sheetwrap{overflow:auto;border:1px solid #b7bdc7;border-radius:10px;background:#fff}.sheet{border-collapse:collapse;min-width:650px;width:100%;font-size:12px}.sheet th,.sheet td{border:1px solid #8b929e;padding:4px;min-height:26px}.sheet th{background:#eef0f4}.total{background:#fff5bc;font-weight:700}.drawer{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:30;display:none;align-items:flex-end}.drawer.on{display:flex}.panel{background:#fff;width:100%;max-height:92dvh;overflow:auto;border-radius:18px 18px 0 0;padding:14px 14px calc(18px + env(safe-area-inset-bottom))}.handle{width:42px;height:5px;background:#d1d5db;border-radius:99px;margin:0 auto 12px}.toast{position:fixed;left:14px;right:14px;bottom:calc(78px + env(safe-area-inset-bottom));background:#111827;color:#fff;border-radius:10px;padding:12px 14px;z-index:40;display:none}.toast.on{display:block}@media(min-width:720px){body{background:#d5dae1}.app{width:390px;margin:20px auto;min-height:820px;border:8px solid #111;border-radius:30px;overflow:hidden;background:var(--bg);position:relative}.nav{left:50%;right:auto;transform:translateX(-50%);width:390px;border-radius:0 0 22px 22px}.toast{left:calc(50% - 181px);right:calc(50% - 181px)}}@media print{.top,.nav,.btn,.drawer,.toast{display:none!important}.app{border:0!important;width:auto!important;margin:0!important;padding:0!important}.main{max-width:none;padding:0}.card{border:0}.sheet{min-width:0;font-size:10px}}
</style>
</head>
<body>
<div class='app'>
<header class='top'><h1 id='title'>作業日報</h1><p id='sub'>スマホ確認用 試作版</p></header>
<main class='main' id='view'></main>
<nav class='nav' id='nav'></nav>
<div class='drawer' id='drawer' onclick='if(event.target.id==="drawer")closePanel()'><div class='panel'><div class='handle'></div><div id='panel'></div></div></div>
<div class='toast' id='toast'></div>
</div>
<script>
const key='deme-mobile-public-v1';
const base={month:'2026-06',job:'j1',route:'report',workers:['w1','w2'],jobs:[{id:'j1',name:'青葉マンション改修工事',client:'青葉建設',status:'稼働中'},{id:'j2',name:'南町ビル設備更新',client:'南町開発',status:'稼働中'}],workersAll:[{id:'w1',name:'山田 太郎',kana:'ヤマダ タロウ',company:'自社',trade:'電気工',health:'2025-09-10',ins:'協会けんぽ',license:'高所作業車・職長教育'},{id:'w2',name:'佐藤 一郎',kana:'サトウ イチロウ',company:'協力会社A',trade:'設備工',health:'2025-07-03',ins:'協会けんぽ',license:'玉掛け'},{id:'w3',name:'鈴木 健',kana:'スズキ ケン',company:'協力会社B',trade:'内装工',health:'2024-11-20',ins:'国保',license:'足場特別教育'}],reports:[{day:1,job:'j1',content:'共用部配線',labor:2,overtime:1,car:1,distance:18,note:'2名'},{day:2,job:'j1',content:'器具取付',labor:1.5,overtime:0,car:1,distance:18,note:''},{day:3,job:'j2',content:'配管確認',labor:1,overtime:0.5,car:0,distance:0,note:'午後のみ'}],masters:{company:['自社','協力会社A','協力会社B'],trade:['電気工','設備工','内装工','大工'],ins:['協会けんぽ','国保','未加入']}};
let db=JSON.parse(localStorage.getItem(key)||'null')||structuredClone(base);let editing=null;const $=id=>document.getElementById(id);const job=()=>db.jobs.find(j=>j.id===db.job)||db.jobs[0];const save=()=>localStorage.setItem(key,JSON.stringify(db));function toast(t){$('toast').textContent=t;$('toast').classList.add('on');setTimeout(()=>$('toast').classList.remove('on'),1700)}
function nav(){const a=[['report','日報'],['summary','出面'],['roster','名簿'],['worker','作業員']];$('nav').innerHTML=a.map(x=>`<button class='${db.route===x[0]?'on':''}' onclick='go("${x[0]}")'>${x[1]}</button>`).join('')}function go(r){db.route=r;save();render()}function head(t,s){$('title').textContent=t;$('sub').textContent=s||'スマホ確認用 試作版'}
function selector(){return `<div class='grid2'><div class='field'><label>現場</label><select onchange='db.job=this.value;save();render()'>${db.jobs.map(j=>`<option value='${j.id}' ${j.id===db.job?'selected':''}>${j.name}</option>`).join('')}</select></div><div class='field'><label>対象月</label><input class='inp' type='month' value='${db.month}' onchange='db.month=this.value;save();render()'></div></div>`}
function reports(){return db.reports.filter(r=>r.job===db.job).sort((a,b)=>a.day-b.day)}function totals(){let t={labor:0,ot:0,work:0,car:0,dist:0};reports().forEach(r=>{t.labor+=+r.labor||0;t.ot+=+r.overtime||0;t.work+=(+r.labor||0)*8;t.car+=+r.car||0;t.dist+=+r.distance||0});return t}
function report(){head('作業日報','現場ごとに日別入力');let rs=reports();return `<div class='card'>${selector()}<div class='grid2' style='margin-top:10px'><button class='btn main' onclick='openReport()'>日報を追加</button><button class='btn' onclick='printMonthly()'>月次表を見る</button></div></div><div class='metrics'>${metric('人工',totals().labor,'人')}${metric('残業',totals().ot,'H')}${metric('勤務',totals().work,'H')}</div><div class='card'><p class='ttl'>入力済み日報</p><div class='list'>${rs.map(r=>`<div class='item' onclick='openReport(${r.day})'><div class='row between'><b>${r.day}日</b><span class='pill'>${r.labor}人工</span></div><div>${r.content||'作業内容未入力'}</div><div class='muted small'>残業 ${r.overtime||0}H / 車両 ${r.car||0} / 距離 ${r.distance||0}km</div></div>`).join('')||'<div class="muted">まだ入力がありません。</div>'}</div></div>`}
function metric(a,b,c){return `<div class='metric'><div class='num'>${b}</div><div class='small muted'>${a}${c?` ${c}`:''}</div></div>`}
function openReport(day){const r=db.reports.find(x=>x.job===db.job&&x.day===day)||{day:new Date().getDate(),job:db.job,content:'',labor:1,overtime:0,car:0,distance:0,note:''};editing=day||null;$('panel').innerHTML=`<p class='ttl'>日報入力</p><div class='stack'><div class='grid2'><div class='field'><label>日付</label><input class='inp' id='d_day' type='number' min='1' max='31' value='${r.day}'></div><div class='field'><label>人工</label><select id='d_labor'><option ${r.labor==0.5?'selected':''}>0.5</option><option ${r.labor==1?'selected':''}>1</option><option ${r.labor==1.5?'selected':''}>1.5</option><option ${r.labor==2?'selected':''}>2</option><option ${r.labor==3?'selected':''}>3</option></select></div></div><div class='field'><label>作業内容</label><textarea id='d_content'>${r.content||''}</textarea></div><div class='grid2'><div class='field'><label>残業H</label><input class='inp' id='d_ot' type='number' step='0.5' value='${r.overtime||0}'></div><div class='field'><label>車両</label><input class='inp' id='d_car' type='number' value='${r.car||0}'></div></div><div class='grid2'><div class='field'><label>距離km</label><input class='inp' id='d_dist' type='number' value='${r.distance||0}'></div><div class='field'><label>備考</label><input class='inp' id='d_note' value='${r.note||''}'></div></div><button class='btn main' onclick='saveReport()'>保存</button>${editing?`<button class='btn warn' onclick='delReport(${editing})'>削除</button>`:''}</div>`;$('drawer').classList.add('on')}function closePanel(){$('drawer').classList.remove('on')}function val(id){return $(id).value}function saveReport(){let day=+val('d_day');db.reports=db.reports.filter(r=>!(r.job===db.job&&r.day===editing));db.reports.push({day,job:db.job,content:val('d_content'),labor:+val('d_labor'),overtime:+val('d_ot'),car:+val('d_car'),distance:+val('d_dist'),note:val('d_note')});save();closePanel();toast('日報を保存しました');render()}function delReport(day){db.reports=db.reports.filter(r=>!(r.job===db.job&&r.day===day));save();closePanel();toast('削除しました');render()}
function monthlyTable(){let rs=reports();let rows='';for(let d=1;d<=31;d++){let r=rs.find(x=>x.day===d)||{};rows+=`<tr><td>${d}</td><td>${job().name}</td><td>${r.content||''}</td><td>${r.labor||''}</td><td>${r.overtime||''}</td><td>${r.car||''}</td><td>${r.distance||''}</td><td>${r.note||''}</td></tr>`}let t=totals();rows+=`<tr class='total'><td>合計</td><td></td><td></td><td>${t.labor}</td><td>${t.ot}</td><td>${t.car}</td><td>${t.dist}</td><td></td></tr>`;return `<div class='sheetwrap'><table class='sheet'><thead><tr><th>日付</th><th>現場名</th><th>作業内容</th><th>人工</th><th>残業</th><th>車両</th><th>距離数</th><th>備考</th></tr></thead><tbody>${rows}</tbody></table></div>`}function printMonthly(){head('月次作業日報','作業日報の月表');$('view').innerHTML=`<div class='card'><button class='btn sm' onclick='render()'>戻る</button><button class='btn sm' onclick='window.print()'>印刷/PDF</button></div><div class='card'><p class='ttl'>${db.month} 作業日報</p>${monthlyTable()}</div>`}
function summary(){head('出面表','日報データから月次集計');let t=totals();let rows='';for(let d=1;d<=31;d++){let r=reports().find(x=>x.day===d)||{};let l=+r.labor||0;rows+=`<tr><td>${d}</td><td>${l||''}</td><td>${l?l*8:''}</td><td>${r.overtime||''}</td><td></td></tr>`}rows+=`<tr class='total'><td>集計</td><td>${t.labor}</td><td>${t.work}</td><td>${t.ot}</td><td></td></tr>`;return `<div class='card'>${selector()}<div class='small muted' style='margin-top:8px'>勤務時間は人工×8時間で仮計算。</div></div><div class='metrics'>${metric('人工',t.labor,'人')}${metric('勤務',t.work,'H')}${metric('残業',t.ot,'H')}</div><div class='card'><div class='row between'><p class='ttl'>出面表</p><button class='btn sm' onclick='window.print()'>印刷/PDF</button></div><div class='sheetwrap'><table class='sheet'><thead><tr><th>月日</th><th>人工数</th><th>勤務時間</th><th>残業</th><th>深夜残業</th></tr></thead><tbody>${rows}</tbody></table></div></div>`}
function roster(){head('作業員名簿','現場ごとに作業員選択');let s=new Set(db.workers);return `<div class='card'>${selector()}<div class='small muted' style='margin-top:8px'>正式版では元請指定様式に合わせてPDF化。</div></div><div class='card'><p class='ttl'>提出対象者</p>${db.workersAll.map(w=>`<label class='row' style='min-height:44px'><input type='checkbox' ${s.has(w.id)?'checked':''} onchange='toggleWorker("${w.id}",this.checked)' style='width:22px;height:22px'><span><b>${w.name}</b><br><span class='small muted'>${w.company} / ${w.trade}</span></span></label>`).join('')}</div><div class='card'><div class='row between'><p class='ttl'>名簿プレビュー</p><button class='btn sm' onclick='window.print()'>印刷/PDF</button></div>${rosterTable()}</div>`}function toggleWorker(id,on){let s=new Set(db.workers);on?s.add(id):s.delete(id);db.workers=[...s];save();render()}function rosterTable(){let ws=db.workersAll.filter(w=>db.workers.includes(w.id));return `<div class='sheetwrap'><table class='sheet'><thead><tr><th>No</th><th>氏名</th><th>フリガナ</th><th>職種</th><th>健診日</th><th>保険</th><th>資格・教育</th></tr></thead><tbody>${ws.map((w,i)=>`<tr><td>${i+1}</td><td>${w.name}</td><td>${w.kana}</td><td>${w.trade}</td><td>${w.health}</td><td>${w.ins}</td><td>${w.license}</td></tr>`).join('')}</tbody></table></div>`}
function worker(){head('作業員管理','新規追加・修正');return `<div class='card'><button class='btn main' onclick='openWorker()'>作業員を追加</button></div><div class='list'>${db.workersAll.map(w=>`<div class='item' onclick='openWorker("${w.id}")'><div class='row between'><div><b>${w.name}</b><div class='small muted'>${w.company} / ${w.trade}</div></div><span class='pill ${w.health<'2025-01-01'?'warn':'ok'}'>健診 ${w.health}</span></div><div class='small muted'>${w.license}</div></div>`).join('')}</div>`}function openWorker(id){let w=db.workersAll.find(x=>x.id===id)||{id:null,name:'',kana:'',company:'自社',trade:'電気工',health:'',ins:'協会けんぽ',license:''};editing=id||null;$('panel').innerHTML=`<p class='ttl'>作業員情報</p><div class='stack'><div class='grid2'><div class='field'><label>氏名</label><input class='inp' id='w_name' value='${w.name}'></div><div class='field'><label>フリガナ</label><input class='inp' id='w_kana' value='${w.kana}'></div></div><div class='grid2'><div class='field'><label>所属</label><select id='w_company'>${db.masters.company.map(x=>`<option ${x===w.company?'selected':''}>${x}</option>`).join('')}</select></div><div class='field'><label>職種</label><select id='w_trade'>${db.masters.trade.map(x=>`<option ${x===w.trade?'selected':''}>${x}</option>`).join('')}</select></div></div><div class='grid2'><div class='field'><label>健康診断日</label><input class='inp' id='w_health' type='date' value='${w.health}'></div><div class='field'><label>保険</label><select id='w_ins'>${db.masters.ins.map(x=>`<option ${x===w.ins?'selected':''}>${x}</option>`).join('')}</select></div></div><div class='field'><label>資格・教育</label><textarea id='w_license'>${w.license}</textarea></div><button class='btn main' onclick='saveWorker()'>保存</button>${editing?`<button class='btn warn' onclick='delWorker("${editing}")'>削除</button>`:''}</div>`;$('drawer').classList.add('on')}function saveWorker(){let data={id:editing||'w'+Date.now(),name:val('w_name'),kana:val('w_kana'),company:val('w_company'),trade:val('w_trade'),health:val('w_health'),ins:val('w_ins'),license:val('w_license')};if(editing){Object.assign(db.workersAll.find(w=>w.id===editing),data)}else{db.workersAll.push(data)}save();closePanel();toast('保存しました');render()}function delWorker(id){db.workersAll=db.workersAll.filter(w=>w.id!==id);db.workers=db.workers.filter(x=>x!==id);save();closePanel();toast('削除しました');render()}
function render(){nav();let html=db.route==='report'?report():db.route==='summary'?summary():db.route==='roster'?roster():worker();$('view').innerHTML=html}render();
</script>
</body>
</html>
