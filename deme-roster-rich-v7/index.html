<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>作業員名簿 UI v7</title>
<style>
:root{--bg:#f3f6f8;--card:#fff;--ink:#101828;--muted:#667085;--line:#d0d5dd;--brand:#14532d;--brand2:#166534;--soft:#ecfdf3;--blue:#175cd3;--bluebg:#eff8ff;--amber:#b54708;--amberbg:#fffaeb;--red:#b42318;--redbg:#fef3f2;--shadow:0 12px 30px rgba(16,24,40,.08);--r:22px}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#d9dee6;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;font-size:15px;line-height:1.45}button,input,select,textarea{font:inherit}button{cursor:pointer}b{font-weight:850}.phone{min-height:100dvh;background:var(--bg);padding-bottom:calc(84px + env(safe-area-inset-bottom))}.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 10px) 14px 10px}.toprow{display:flex;align-items:center;justify-content:space-between;gap:10px}.left{display:flex;align-items:center;gap:10px;min-width:0}.logo{width:36px;height:36px;border-radius:14px;background:linear-gradient(135deg,#14532d,#15803d);display:grid;place-items:center;color:#fff;font-weight:950}.back{width:36px;height:36px;border:0;border-radius:999px;background:#f2f4f7;color:#344054;font-size:22px}.top h1{font-size:18px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.top p{font-size:12px;color:var(--muted);margin:1px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mini{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:850;color:#344054;white-space:nowrap}.wrap{max-width:520px;margin:0 auto;padding:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.flat{box-shadow:none}.title{font-size:17px;font-weight:950;margin:0 0 8px}.sub{font-size:12px;color:var(--muted)}.tiny{font-size:11px;color:var(--muted)}.row{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn{border:1px solid var(--line);background:#fff;color:#1f2937;border-radius:16px;min-height:52px;padding:10px 13px;font-weight:900}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn.dark{background:#111827;border-color:#111827;color:#fff}.btn.sm{min-height:36px;padding:7px 10px;border-radius:11px;font-size:12px}.btn.danger{border-color:#fecdca;color:var(--red);background:#fff}.input,select,textarea{width:100%;min-height:52px;border:1px solid #cbd5e1;border-radius:16px;background:#fff;color:var(--ink);padding:12px;outline:none}textarea{min-height:120px;resize:vertical}.field{display:grid;gap:6px;margin-bottom:10px}.field label{font-size:12px;font-weight:850;color:#344054}.pill{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:850;color:#344054;white-space:nowrap}.ok{background:var(--soft);border-color:#bbf7d0;color:var(--brand2)}.warn{background:var(--amberbg);border-color:#fedf89;color:var(--amber)}.bad{background:var(--redbg);border-color:#fecdca;color:var(--red)}.blue{background:var(--bluebg);border-color:#b2ddff;color:var(--blue)}.hero{background:linear-gradient(135deg,#0d3b26,#166534);border:0;color:#fff;overflow:hidden;position:relative}.hero:after{content:"";position:absolute;right:-54px;top:-54px;width:160px;height:160px;border-radius:999px;background:rgba(255,255,255,.1)}.hero .sub,.hero .tiny{color:#d1fadf}.stepbar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:12px 0 8px}.stepbar span{height:6px;background:#e5e7eb;border-radius:999px}.stepbar span.on{background:var(--brand)}.stepLabels{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;text-align:center;font-size:10px;color:var(--muted)}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.stat strong{display:block;font-size:22px;line-height:1}.stat span{font-size:11px;color:var(--muted)}.task{display:grid;grid-template-columns:46px 1fr 24px;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:21px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}.task:active,.worker:active,.item:active{background:#f8fafc}.ico{width:46px;height:46px;border-radius:17px;background:var(--soft);color:var(--brand2);display:grid;place-items:center;font-weight:950;font-size:20px}.ico.warn{background:var(--amberbg);color:var(--amber)}.ico.blue{background:var(--bluebg);color:var(--blue)}.chev{font-size:27px;color:#98a2b3}.search{display:flex;gap:8px}.chips{display:flex;gap:8px;overflow:auto;padding:2px 0 4px}.chip{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-size:13px;font-weight:900}.chip.on{background:#111827;color:#fff;border-color:#111827}.worker{border:1px solid var(--line);background:#fff;border-radius:20px;padding:12px;margin-bottom:9px;box-shadow:0 4px 14px rgba(16,24,40,.04)}.workerTop{display:grid;grid-template-columns:30px 44px 1fr auto;gap:9px;align-items:center}.workerTop input{width:24px;height:24px}.avatar{width:44px;height:44px;border-radius:16px;background:#f2f4f7;display:grid;place-items:center;font-weight:950;color:#344054}.wname{font-weight:950}.wmeta{font-size:12px;color:var(--muted);margin-top:1px}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.infoGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.info{border:1px solid var(--line);background:#fff;border-radius:16px;padding:11px}.info b{display:block;font-size:14px}.info span{font-size:11px;color:var(--muted)}.issue{border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px;margin-bottom:9px}.issueHead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}.fieldcard{background:#fff;border:1px solid var(--line);border-radius:17px;padding:12px;margin-bottom:8px}.fieldcard:active{background:#f8fafc}.preview{border:1px solid #98a2b3;border-radius:16px;overflow:auto;background:#fff}.sheet{border-collapse:collapse;min-width:760px;width:100%;font-size:12px}.sheet th,.sheet td{border:1px solid #98a2b3;padding:6px;text-align:left}.sheet th{background:#eef2f6}.bottomAction{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);box-shadow:0 -8px 22px rgba(16,24,40,.08);padding:8px 12px calc(8px + env(safe-area-inset-bottom))}.bottomInner{max-width:520px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}.bottomInner .full{grid-column:1/3}.drawer{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:50;display:none;align-items:flex-end}.drawer.on{display:flex}.panel{background:#fff;width:100%;max-height:90dvh;overflow:auto;border-radius:26px 26px 0 0;padding:14px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -12px 36px rgba(15,23,42,.22)}.handle{width:46px;height:5px;background:#d0d5dd;border-radius:999px;margin:0 auto 12px}.toast{position:fixed;left:12px;right:12px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:60;background:#111827;color:#fff;border-radius:14px;padding:12px 14px;display:none}.toast.on{display:block}.empty{text-align:center;color:var(--muted);border:1px dashed #cbd5e1;border-radius:16px;background:#fff;padding:18px}.hide{display:none!important}@media(min-width:720px){.phone{width:390px;min-height:820px;margin:18px auto;border:8px solid #111827;border-radius:34px;overflow:hidden;position:relative}.bottomAction{left:50%;right:auto;transform:translateX(-50%);width:390px;border-radius:0 0 25px 25px}.toast{left:calc(50% - 183px);right:calc(50% - 183px)}}@media print{body{background:#fff}.phone{width:auto!important;border:0!important;margin:0!important;padding:0}.top,.bottomAction,.drawer,.toast,.btn,.search,.chips{display:none!important}.wrap{max-width:none;padding:0}.card{box-shadow:none;border:0}.sheet{min-width:0;font-size:10px}}
</style>
</head>
<body>
<div class="phone">
<header class="top"><div class="toprow"><div class="left" id="head"></div><button class="mini" onclick="openContext()">現場</button></div></header>
<main class="wrap" id="app"></main>
<div class="bottomAction" id="bottom"></div>
<div class="drawer" id="drawer" onclick="if(event.target.id==='drawer')closePanel()"><div class="panel"><div class="handle"></div><div id="panel"></div></div></div>
<div class="toast" id="toast"></div>
</div>
<script>
const KEY='deme-roster-v7';
const seed={screen:'dashboard',job:'j1',filter:'all',query:'',selected:['w1','w2'],jobs:[{id:'j1',name:'青葉マンション改修工事',client:'青葉建設',format:'元請指定様式A',address:'東京都中央区',period:'2026/06/01〜2026/08/31'},{id:'j2',name:'南町ビル設備更新',client:'南町開発',format:'元請指定様式B',address:'神奈川県横浜市',period:'2026/07/01〜2026/09/15'}],workers:[{id:'w1',name:'山田 太郎',kana:'ヤマダ タロウ',company:'自社',trade:'電気工',birth:'1985-04-12',age:41,blood:'A',phone:'090-0000-0001',emergency:'山田花子 090-1111-1111',address:'東京都江東区',health:'2025-09-10',insurance:'協会けんぽ',pension:'厚生年金',employment:'雇用保険',licenses:'職長教育・高所作業車',entry:'2026-06-01',role:'作業員',sendEdu:'2026-05-28',acceptEdu:'2026-06-01',memo:''},{id:'w2',name:'佐藤 一郎',kana:'サトウ イチロウ',company:'協力会社A',trade:'設備工',birth:'1979-10-02',age:46,blood:'O',phone:'090-0000-0002',emergency:'佐藤美紀 090-2222-2222',address:'埼玉県川口市',health:'2025-07-03',insurance:'協会けんぽ',pension:'厚生年金',employment:'雇用保険',licenses:'玉掛け',entry:'2026-06-01',role:'職長',sendEdu:'2026-05-29',acceptEdu:'2026-06-01',memo:''},{id:'w3',name:'鈴木 健',kana:'スズキ ケン',company:'協力会社B',trade:'内装工',birth:'1992-03-18',age:34,blood:'B',phone:'090-0000-0003',emergency:'鈴木恵 090-3333-3333',address:'千葉県船橋市',health:'2024-11-20',insurance:'国保',pension:'国民年金',employment:'未確認',licenses:'足場特別教育',entry:'',role:'作業員',sendEdu:'',acceptEdu:'',memo:''},{id:'w4',name:'高橋 誠',kana:'タカハシ マコト',company:'自社',trade:'電気工',birth:'1988-07-21',age:37,blood:'AB',phone:'090-0000-0004',emergency:'高橋舞 090-4444-4444',address:'東京都足立区',health:'2025-12-11',insurance:'協会けんぽ',pension:'厚生年金',employment:'雇用保険',licenses:'第二種電気工事士',entry:'',role:'作業員',sendEdu:'',acceptEdu:'',memo:''}]};
let db=JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(seed);const $=id=>document.getElementById(id);const save=()=>localStorage.setItem(KEY,JSON.stringify(db));
function job(){return db.jobs.find(j=>j.id===db.job)||db.jobs[0]}function selected(){return db.workers.filter(w=>db.selected.includes(w.id))}function problems(w){let a=[];if(!w.entry)a.push('入場日');if(!w.sendEdu)a.push('送り出し教育');if(!w.acceptEdu)a.push('受入教育');if(!w.health||w.health<'2025-01-01')a.push('健康診断日');if(!w.employment||w.employment==='未確認')a.push('雇用保険');return a}function issueCount(){return selected().reduce((n,w)=>n+problems(w).length,0)}function workerIssues(){return selected().filter(w=>problems(w).length)}function pct(){let s=selected().length;if(!s)return 0;return Math.round((s-workerIssues().length)/s*100)}function toast(t){$('toast').textContent=t;$('toast').classList.add('on');setTimeout(()=>$('toast').classList.remove('on'),1500)}function closePanel(){$('drawer').classList.remove('on')}function head(t,s,back=false){$('head').innerHTML=`${back?'<button class="back" onclick="go(\'dashboard\')">‹</button>':'<div class="logo">名</div>'}<div style="min-width:0"><h1>${t}</h1><p>${s||''}</p></div>`}function go(s){db.screen=s;save();render()}function setBottom(html){$('bottom').innerHTML=html||'';$('bottom').classList.toggle('hide',!html)}
function stepbar(n){return `<div class="stepbar">${[1,2,3,4].map(i=>`<span class="${i<=n?'on':''}"></span>`).join('')}</div><div class="stepLabels"><span>現場</span><span>選択</span><span>確認</span><span>PDF</span></div>`}
function dashboard(){head('作業員名簿','元請提出用の名簿作成');setBottom(`<div class="bottomInner"><button class="btn primary full" onclick="go('select')">名簿作成を始める</button></div>`);let j=job();return `<div class="card hero"><div class="row between"><div><div class="sub">提出先</div><div class="title">${j.client}</div><div class="tiny">${j.name}</div></div><span class="pill ok">${j.format}</span></div>${stepbar(1)}</div><div class="grid3"><div class="stat"><strong>${selected().length}</strong><span>選択中</span></div><div class="stat"><strong>${workerIssues().length}</strong><span>要確認者</span></div><div class="stat"><strong>${pct()}%</strong><span>準備率</span></div></div><div class="task" onclick="go('select')"><div class="ico">人</div><div><b>作業員を選ぶ</b><div class="sub">自社・協力会社から提出対象者を選択</div></div><div class="chev">›</div></div><div class="task" onclick="go('review')"><div class="ico warn">!</div><div><b>提出前チェック</b><div class="sub">入場日・教育日・健康診断日を確認</div></div><div class="chev">›</div></div><div class="task" onclick="go('preview')"><div class="ico blue">PDF</div><div><b>名簿プレビュー</b><div class="sub">元請へ送る前の見た目確認</div></div><div class="chev">›</div></div><div class="card flat"><div class="row between"><div><b>現場情報</b><div class="sub">${j.address}<br>${j.period}</div></div><button class="btn sm" onclick="openContext()">変更</button></div></div>`}
function filteredWorkers(){let q=db.query.trim().toLowerCase();return db.workers.filter(w=>{let ok=true;if(db.filter==='selected')ok=db.selected.includes(w.id);if(db.filter==='issues')ok=problems(w).length>0;if(db.filter==='own')ok=w.company==='自社';if(db.filter==='partner')ok=w.company!=='自社';if(q)ok=ok&&(w.name+w.kana+w.company+w.trade).toLowerCase().includes(q);return ok})}
function selectScreen(){head('作業員選択','提出する作業員を選ぶ',true);setBottom(`<div class="bottomInner"><button class="btn" onclick="go('dashboard')">戻る</button><button class="btn primary" onclick="go('review')">確認へ進む</button></div>`);return `<div class="card"><div class="row between"><div><div class="title" style="margin:0">${job().name}</div><div class="sub">選択中 ${selected().length}名</div></div><span class="pill ${selected().length?'ok':'warn'}">${selected().length?'選択あり':'未選択'}</span></div>${stepbar(2)}</div><div class="card"><div class="search"><input class="input" placeholder="氏名・会社・職種で検索" value="${db.query}" oninput="db.query=this.value;save();render()"><button class="btn" onclick="db.query='';save();render()">消</button></div><div class="chips" style="margin-top:10px">${filterChip('all','全員')}${filterChip('selected','選択中')}${filterChip('issues','要確認')}${filterChip('own','自社')}${filterChip('partner','協力会社')}</div></div><div>${filteredWorkers().map(workerCard).join('')||'<div class="empty">該当する作業員がいません。</div>'}</div>`}
function filterChip(k,t){return `<button class="chip ${db.filter===k?'on':''}" onclick="db.filter='${k}';save();render()">${t}</button>`}
function workerCard(w){let p=problems(w), checked=db.selected.includes(w.id);return `<div class="worker"><div class="workerTop"><input type="checkbox" ${checked?'checked':''} onchange="toggleWorker('${w.id}',this.checked)"><div class="avatar">${w.name[0]}</div><div onclick="openWorker('${w.id}')"><div class="wname">${w.name}</div><div class="wmeta">${w.company} / ${w.trade}</div></div><span class="pill ${p.length?'warn':'ok'}">${p.length?`${p.length}件`:'OK'}</span></div><div class="badges"><span class="pill blue">健診 ${w.health||'未入力'}</span><span class="pill">${w.insurance}</span><span class="pill">${w.licenses||'資格なし'}</span></div></div>`}
function toggleWorker(id,on){let s=new Set(db.selected);on?s.add(id):s.delete(id);db.selected=[...s];save();render()}
function reviewScreen(){head('提出前チェック','不足・期限を確認',true);setBottom(`<div class="bottomInner"><button class="btn" onclick="go('select')">選択へ戻る</button><button class="btn primary" onclick="go('preview')">PDF確認へ</button></div>`);let issues=workerIssues();return `<div class="card"><div class="row between"><div><div class="title" style="margin:0">提出前チェック</div><div class="sub">${selected().length}名中 ${issues.length}名に確認事項</div></div><span class="pill ${issues.length?'warn':'ok'}">${issues.length?'確認あり':'OK'}</span></div>${stepbar(3)}</div><div class="grid3"><div class="stat"><strong>${selected().length}</strong><span>対象者</span></div><div class="stat"><strong>${issueCount()}</strong><span>確認項目</span></div><div class="stat"><strong>${pct()}%</strong><span>準備率</span></div></div>${selected().map(issueCard).join('')||'<div class="empty">対象者が選択されていません。</div>'}`}
function issueCard(w){let p=problems(w);return `<div class="issue"><div class="issueHead"><div><b>${w.name}</b><div class="sub">${w.company} / ${w.trade}</div></div><span class="pill ${p.length?'warn':'ok'}">${p.length?p.join('・'):'OK'}</span></div><div class="badges"><span class="pill">入場 ${w.entry||'未入力'}</span><span class="pill">送出 ${w.sendEdu||'未入力'}</span><span class="pill">受入 ${w.acceptEdu||'未入力'}</span></div><button class="btn sm" style="width:100%;margin-top:10px" onclick="openSite('${w.id}')">現場別項目を修正</button></div>`}
function previewScreen(){head('名簿プレビュー','提出前の最終確認',true);setBottom(`<div class="bottomInner"><button class="btn" onclick="go('review')">戻る</button><button class="btn primary" onclick="toast('PDF出力は次フェーズで実装します')">PDF作成</button></div>`);let j=job();return `<div class="card"><div class="row between"><div><div class="title" style="margin:0">${j.client} 提出用</div><div class="sub">${j.name}</div></div><span class="pill ${workerIssues().length?'warn':'ok'}">${workerIssues().length?'確認あり':'提出可'}</span></div>${stepbar(4)}</div><div class="card"><div class="title">PDF化前チェック</div><div class="item row between"><span>対象者</span><span class="pill">${selected().length}名</span></div><div class="item row between"><span>確認事項</span><span class="pill ${workerIssues().length?'warn':'ok'}">${issueCount()}件</span></div><div class="item row between"><span>元請様式</span><span class="pill blue">${j.format}</span></div></div><div class="card"><div class="title">名簿プレビュー</div><div class="preview"><table class="sheet"><thead><tr><th>No</th><th>氏名</th><th>会社</th><th>職種</th><th>入場日</th><th>健診日</th><th>資格</th><th>教育</th></tr></thead><tbody>${selected().map((w,i)=>`<tr><td>${i+1}</td><td>${w.name}<br>${w.kana}</td><td>${w.company}</td><td>${w.trade}</td><td>${w.entry||''}</td><td>${w.health||''}</td><td>${w.licenses||''}</td><td>${w.sendEdu&&w.acceptEdu?'済':'確認'}</td></tr>`).join('')}</tbody></table></div></div>`}
function openWorker(id){let w=db.workers.find(x=>x.id===id);$('panel').innerHTML=`<div class="title">作業員詳細</div><div class="infoGrid"><div class="info"><span>氏名</span><b>${w.name}</b></div><div class="info"><span>職種</span><b>${w.trade}</b></div><div class="info"><span>会社</span><b>${w.company}</b></div><div class="info"><span>健診日</span><b>${w.health}</b></div></div><div class="fieldcard"><div class="fname">資格・教育</div><div class="fval">${w.licenses}</div></div><div class="fieldcard"><div class="fname">緊急連絡先</div><div class="fval">${w.emergency}</div></div><button class="btn primary" style="width:100%" onclick="closePanel();openSite('${id}')">現場別項目を修正</button>`;$('drawer').classList.add('on')}
function openSite(id){let w=db.workers.find(x=>x.id===id);$('panel').innerHTML=`<div class="title">現場別項目</div><div class="sub" style="margin-bottom:12px">${w.name} / ${job().name}</div><div class="field"><label>入場日</label><input id="entry" class="input" type="date" value="${w.entry||''}"></div><div class="field"><label>役割</label><select id="role"><option ${w.role==='作業員'?'selected':''}>作業員</option><option ${w.role==='職長'?'selected':''}>職長</option><option ${w.role==='現場代理人'?'selected':''}>現場代理人</option></select></div><div class="field"><label>送り出し教育日</label><input id="sendEdu" class="input" type="date" value="${w.sendEdu||''}"></div><div class="field"><label>受入教育日</label><input id="acceptEdu" class="input" type="date" value="${w.acceptEdu||''}"></div><div class="field"><label>備考</label><textarea id="memo" class="input">${w.memo||''}</textarea></div><button class="btn primary" style="width:100%" onclick="saveSite('${id}')">保存する</button>`;$('drawer').classList.add('on')}
function saveSite(id){let w=db.workers.find(x=>x.id===id);w.entry=$('entry').value;w.role=$('role').value;w.sendEdu=$('sendEdu').value;w.acceptEdu=$('acceptEdu').value;w.memo=$('memo').value;save();closePanel();toast('保存しました');render()}
function openContext(){let j=job();$('panel').innerHTML=`<div class="title">現場を変更</div><div class="field"><label>現場</label><select id="ctx_job">${db.jobs.map(x=>`<option value="${x.id}" ${x.id===db.job?'selected':''}>${x.name}</option>`).join('')}</select></div><button class="btn primary" style="width:100%" onclick="db.job=$('ctx_job').value;save();closePanel();render();toast('現場を変更しました')">変更する</button>`;$('drawer').classList.add('on')}
function render(){const pages={dashboard,select:selectScreen,review:reviewScreen,preview:previewScreen};$('app').innerHTML=pages[db.screen]();}render();
</script>
</body>
