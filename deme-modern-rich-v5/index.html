<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>現場アプリ UI v5</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--ink:#101828;--muted:#667085;--line:#d0d5dd;--main:#14532d;--main2:#166534;--soft:#ecfdf3;--soft2:#f6fef9;--warn:#b54708;--warnbg:#fffaeb;--bad:#b42318;--badbg:#fef3f2;--blue:#175cd3;--bluebg:#eff8ff;--shadow:0 12px 28px rgba(16,24,40,.09);--r:22px}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#d9dee6;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;font-size:15px;line-height:1.45}button,input,select,textarea{font:inherit}button{cursor:pointer}b{font-weight:850}.phone{min-height:100dvh;background:var(--bg);padding-bottom:calc(78px + env(safe-area-inset-bottom))}.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 10px) 14px 10px}.toprow{display:flex;align-items:center;justify-content:space-between;gap:10px}.left{display:flex;align-items:center;gap:10px}.logo{width:36px;height:36px;border-radius:13px;background:linear-gradient(135deg,#14532d,#15803d);display:grid;place-items:center;color:#fff;font-weight:950}.top h1{font-size:18px;margin:0}.top p{font-size:12px;color:var(--muted);margin:1px 0 0}.mini{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:850;color:#344054}.back{border:0;background:#f2f4f7;border-radius:999px;width:36px;height:36px;font-size:21px}.wrap{max-width:520px;margin:0 auto;padding:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.flat{box-shadow:none}.title{font-size:17px;font-weight:950;margin:0 0 8px}.sub{font-size:12px;color:var(--muted)}.row{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn{border:1px solid var(--line);background:#fff;color:#1f2937;border-radius:15px;min-height:48px;padding:10px 12px;font-weight:900}.btn.primary{background:var(--main);border-color:var(--main);color:#fff}.btn.dark{background:#111827;border-color:#111827;color:#fff}.btn.sm{min-height:34px;padding:6px 9px;border-radius:10px;font-size:12px}.btn.danger{border-color:#fecdca;color:var(--bad)}.input,select,textarea{width:100%;min-height:48px;border:1px solid #cbd5e1;border-radius:15px;background:#fff;padding:11px;color:var(--ink);outline:none}textarea{min-height:126px;resize:vertical}.field{display:grid;gap:5px;margin-bottom:10px}.field label{font-size:12px;font-weight:850;color:#344054}.pill{display:inline-flex;align-items:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:850;color:#344054;white-space:nowrap}.ok{background:var(--soft);border-color:#bbf7d0;color:var(--main2)}.warn{background:var(--warnbg);border-color:#fedf89;color:var(--warn)}.bad{background:var(--badbg);border-color:#fecdca;color:var(--bad)}.blue{background:var(--bluebg);border-color:#b2ddff;color:var(--blue)}.hero{background:linear-gradient(135deg,#0f3d25,#166534);border:0;color:#fff;padding:16px}.hero .sub{color:#d1fadf}.heroTop{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.ring{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(#86efac var(--p),rgba(255,255,255,.22) 0);position:relative}.ring:before{content:"";position:absolute;inset:8px;border-radius:50%;background:#14532d}.ring b{position:relative;font-size:18px}.quick{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.quick .btn{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:#fff}.task{display:grid;grid-template-columns:44px 1fr 24px;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}.task:active,.item:active,.fieldcard:active{background:#f8fafc}.ico{width:44px;height:44px;border-radius:16px;background:var(--soft);color:var(--main2);display:grid;place-items:center;font-weight:950;font-size:20px}.chev{font-size:26px;color:#98a2b3}.stat{background:#fff;border:1px solid var(--line);border-radius:17px;padding:12px}.stat strong{display:block;font-size:22px;line-height:1}.stat span{font-size:11px;color:var(--muted)}.context{background:#fff;border:1px solid var(--line);border-radius:19px;padding:13px;margin-bottom:12px}.dateNav{display:grid;grid-template-columns:44px 1fr 44px;gap:8px;align-items:center;margin-top:10px}.dateBox{border:1px solid var(--line);background:#fff;border-radius:16px;min-height:52px;text-align:center;padding:8px 10px}.dateBox strong{display:block;font-size:18px;line-height:1.05}.dateBox span{font-size:11px;color:var(--muted)}.fieldcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:9px}.fieldhead{display:flex;justify-content:space-between;gap:10px}.fname{font-weight:950}.fval{margin-top:4px;white-space:pre-wrap;color:#1f2937}.placeholder{color:#98a2b3}.calcbox{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px;margin-bottom:12px}.calcmain{font-size:18px;font-weight:950}.calcmain span{color:var(--main2)}.chips{display:flex;gap:8px;overflow:auto;padding:2px 0 4px}.chip{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-size:15px;font-weight:900}.chip.on{background:#111827;color:#fff;border-color:#111827}.stepper{display:grid;grid-template-columns:48px 1fr 48px;gap:10px;align-items:center;margin:10px 0}.stepper button{min-height:54px;border-radius:16px;font-size:22px}.valuebox{text-align:center;border:1px solid var(--line);border-radius:18px;padding:14px;background:#f9fafb}.valuebox strong{display:block;font-size:34px;line-height:1}.valuebox span{font-size:12px;color:var(--muted)}.savebar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);box-shadow:0 -8px 22px rgba(16,24,40,.08);padding:8px 12px calc(8px + env(safe-area-inset-bottom))}.saveinner{max-width:520px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}.saveinner .full{grid-column:1/3}.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:#fff;border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -8px 22px rgba(16,24,40,.08)}.bottomnav button{border:0;background:#fff;border-radius:13px;min-height:54px;color:#667085;font-size:11px;font-weight:900}.bottomnav button span{display:block;font-size:18px;line-height:1.05;margin-bottom:3px}.bottomnav button.on{background:var(--soft);color:var(--main2)}.listrow{display:grid;grid-template-columns:42px 1fr 58px 54px;gap:8px;align-items:center;min-height:50px;padding:8px 10px;border-bottom:1px solid #eaecf0}.listrow:last-child{border-bottom:0}.listrow.head{min-height:38px;background:#f8fafc;font-size:12px;color:#475467;font-weight:850}.listbox{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.sheetbox{overflow:auto;border:1px solid #98a2b3;border-radius:15px;background:#fff}.sheet{border-collapse:collapse;min-width:620px;width:100%;font-size:12px}.sheet th,.sheet td{border:1px solid #98a2b3;padding:5px}.sheet th{background:#eef2f6}.sheet .total td{background:#fff3bf;font-weight:900}.item{border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px;margin-bottom:9px}.check{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:center}.check input{width:24px;height:24px}.progress{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:var(--main);border-radius:999px}.stepbar{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:10px 0}.stepbar span{height:5px;background:#e5e7eb;border-radius:999px}.stepbar span.on{background:var(--main)}.drawer{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:50;display:none;align-items:flex-end}.drawer.on{display:flex}.panel{background:#fff;width:100%;max-height:90dvh;overflow:auto;border-radius:24px 24px 0 0;padding:14px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -12px 36px rgba(15,23,42,.22)}.handle{width:46px;height:5px;background:#d0d5dd;border-radius:999px;margin:0 auto 12px}.toast{position:fixed;left:12px;right:12px;bottom:calc(90px + env(safe-area-inset-bottom));z-index:60;background:#111827;color:#fff;border-radius:13px;padding:12px 14px;display:none}.toast.on{display:block}.empty{text-align:center;color:var(--muted);border:1px dashed #cbd5e1;border-radius:15px;background:#fff;padding:18px}.hide{display:none!important}@media(min-width:720px){.phone{width:390px;min-height:820px;margin:18px auto;border:8px solid #111827;border-radius:34px;overflow:hidden;position:relative}.bottomnav,.savebar{left:50%;right:auto;transform:translateX(-50%);width:390px;border-radius:0 0 25px 25px}.toast{left:calc(50% - 183px);right:calc(50% - 183px)}}@media print{body{background:#fff}.phone{width:auto!important;border:0!important;margin:0!important;padding:0}.top,.bottomnav,.savebar,.drawer,.toast,.btn{display:none!important}.wrap{max-width:none;padding:0}.card{box-shadow:none;border:0}.sheet{min-width:0;font-size:10px}}
</style>
</head>
<body>
<div class="phone">
<header class="top"><div class="toprow"><div class="left" id="barLeft"></div><button class="mini" onclick="openContext()">現場/月</button></div></header>
<main class="wrap" id="app"></main>
<nav class="bottomnav" id="nav"></nav>
<div class="savebar hide" id="saveBar"><div class="saveinner"><button class="btn primary full" onclick="saveReport()" id="saveBtn">保存する</button><button class="btn" onclick="copyPrev()">前日コピー</button><button class="btn" onclick="showListSheet()">一覧</button></div></div>
<div class="drawer" id="drawer" onclick="if(event.target.id==='drawer')closePanel()"><div class="panel"><div class="handle"></div><div id="panel"></div></div></div>
<div class="toast" id="toast"></div>
</div>
<script>
const KEY='deme-modern-rich-v5'; const now=new Date();
const seed={screen:'home',job:'j1',month:'2026-06',day:now.getDate(),dirty:false,draft:null,workersSelected:['w1','w2'],jobs:[{id:'j1',name:'青葉マンション改修工事',client:'青葉建設'},{id:'j2',name:'南町ビル設備更新',client:'南町開発'}],reports:[{day:1,job:'j1',content:'共用部配線・既設確認',labor:2,overtime:1,note:'2名対応'},{day:2,job:'j1',content:'器具取付',labor:1.5,overtime:0,note:''},{day:4,job:'j1',content:'盤まわり確認',labor:1,overtime:.5,note:'午後から'}],workers:[{id:'w1',name:'山田 太郎',company:'自社',trade:'電気工',health:'2025-09-10'},{id:'w2',name:'佐藤 一郎',company:'協力会社A',trade:'設備工',health:'2025-07-03'},{id:'w3',name:'鈴木 健',company:'協力会社B',trade:'内装工',health:'2024-11-20'}],masters:{labor:[0.5,1,1.5,2,2.5,3],ot:[0,0.5,1,1.5,2,2.5,3]}};
let db=JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(seed);const $=id=>document.getElementById(id);const save=()=>localStorage.setItem(KEY,JSON.stringify(db));
const reportFields=[{key:'content',label:'作業内容',type:'text',placeholder:'未入力'},{key:'labor',label:'人工',type:'number',unit:'人工',step:.5,min:0,max:20,presets:'labor',placeholder:'1人工'},{key:'overtime',label:'残業',type:'number',unit:'時間',step:.5,min:0,max:24,presets:'ot',placeholder:'0時間'},{key:'note',label:'備考',type:'text',placeholder:'未入力'}];
function currentJob(){return db.jobs.find(j=>j.id===db.job)||db.jobs[0]}function reports(){return db.reports.filter(r=>r.job===db.job).sort((a,b)=>a.day-b.day)}function rec(day=db.day){return db.reports.find(r=>r.job===db.job&&r.day===day)||null}function dim(){let [y,m]=db.month.split('-').map(Number);return new Date(y,m,0).getDate()}function sums(){return reports().reduce((a,r)=>{a.labor+=+r.labor||0;a.ot+=+r.overtime||0;return a},{labor:0,ot:0,get work(){return +(this.labor*8).toFixed(1)}})}function entered(){return new Set(reports().map(r=>r.day))}function missing(){let s=entered(),n=0;for(let i=1;i<=dim();i++)if(!s.has(i))n++;return n}function fmt(n){return Number.isInteger(+n)?String(+n):String(+Number(n).toFixed(1)).replace(/\.0$/,'')}function toast(t){$('toast').textContent=t;$('toast').classList.add('on');setTimeout(()=>$('toast').classList.remove('on'),1500)}function closePanel(){$('drawer').classList.remove('on')}function setHeader(title,sub,back=false){$('barLeft').innerHTML=`${back?'<button class="back" onclick="go(\'home\')">‹</button>':'<div class="logo">現</div>'}<div><h1>${title}</h1><p>${sub||''}</p></div>`}
function nav(){const items=[['home','ホーム','⌂'],['report','入力','✎'],['list','一覧','☰'],['summary','出面','表'],['roster','名簿','人']];$('nav').innerHTML=items.map(x=>`<button class="${db.screen===x[0]?'on':''}" onclick="go('${x[0]}')"><span>${x[2]}</span>${x[1]}</button>`).join('')}function go(s){if(db.dirty&&!confirm('未保存の入力があります。移動しますか？'))return;db.screen=s;db.dirty=false;if(s!=='report')db.draft=null;save();render()}function draft(){if(!db.draft||db.draft.job!==db.job||db.draft.day!==db.day)db.draft=rec()?structuredClone(rec()):{day:db.day,job:db.job,content:'',labor:1,overtime:0,note:''};return db.draft}function setDay(d){if(db.dirty&&!confirm('未保存の入力があります。日付を変えますか？'))return;db.day=Math.max(1,Math.min(dim(),d));db.draft=null;db.dirty=false;save();render()}function dayText(){return `${db.month}-${String(db.day).padStart(2,'0')}`}
function home(){setHeader('現場ホーム','必要な作業を選ぶ');$('saveBar').classList.add('hide');let s=sums(),pct=Math.round(reports().length/dim()*100);return `<div class="card hero"><div class="heroTop"><div><div class="title">${currentJob().name}</div><div class="sub">${currentJob().client} / ${db.month}</div></div><div class="ring" style="--p:${pct}%"><b>${pct}%</b></div></div><div class="quick"><button class="btn" onclick="go('report')">今日の日報</button><button class="btn" onclick="go('summary')">出面確認</button></div></div><div class="grid3"><div class="stat"><strong>${reports().length}/${dim()}</strong><span>入力済み</span></div><div class="stat"><strong>${fmt(s.labor)}</strong><span>人工合計</span></div><div class="stat"><strong>${fmt(s.work)}</strong><span>勤務時間</span></div></div><div class="task" onclick="go('report')"><div class="ico">✎</div><div><b>日報を入力</b><div class="sub">作業内容・人工・残業・備考</div></div><div class="chev">›</div></div><div class="task" onclick="go('list')"><div class="ico">☰</div><div><b>日報一覧</b><div class="sub">月内の入力状況を確認</div></div><div class="chev">›</div></div><div class="task" onclick="go('summary')"><div class="ico">表</div><div><b>出面表</b><div class="sub">月末提出用に集計</div></div><div class="chev">›</div></div><div class="task" onclick="go('roster')"><div class="ico">人</div><div><b>作業員名簿</b><div class="sub">現場ごとに提出者を選択</div></div><div class="chev">›</div></div><div class="card flat"><div class="row between"><div><b>追加予定項目</b><div class="sub">車両・距離・深夜・請求系は後から拡張</div></div><span class="pill blue">拡張前提</span></div></div>`}
function report(){setHeader('日報入力','この日の分だけ入力',true);$('saveBar').classList.remove('hide');let r=draft(),exist=!!rec();return `<div class="context"><div class="row between"><div><b>${currentJob().name}</b><div class="sub">${db.month}</div></div><span class="pill ${exist?'ok':'warn'}">${exist?'保存済':'未保存'}</span></div><div class="dateNav"><button class="btn" onclick="setDay(db.day-1)">‹</button><button class="dateBox" onclick="openDatePicker()"><strong>${db.day}日</strong><span>日付変更</span></button><button class="btn" onclick="setDay(db.day+1)">›</button></div></div><div class="calcbox"><div class="calcmain">この日の勤務時間：<span>${fmt((+r.labor||0)*8)}時間</span></div><div class="sub">人工 ${fmt(r.labor||0)} × 8時間。人工・残業は0.5単位で入力。</div></div>${reportFields.map(f=>fieldCard(f,r)).join('')}`}
function fieldCard(f,r){let raw=r[f.key],val='',blank=raw===undefined||raw===null||raw==='';if(f.type==='number')val=`${fmt(raw||0)} ${f.unit}`;else val=raw;return `<div class="fieldcard" onclick="openField('${f.key}')"><div class="fieldhead"><div><div class="fname">${f.label}</div><div class="fval ${blank?'placeholder':''}">${blank?f.placeholder:val}</div></div><div class="chev">›</div></div></div>`}
function openField(key){let f=reportFields.find(x=>x.key===key),r=draft(),html='';if(f.type==='text')html=`${panelTitle(f.label)}<textarea id="fv" class="input" placeholder="${f.placeholder||''}">${r[f.key]||''}</textarea>${applyBtn(key)}`;if(f.type==='number')html=numberPanel(f,r[f.key]||0);$('panel').innerHTML=html;$('drawer').classList.add('on')}function panelTitle(t){return `<div class="title">${t}</div><div class="sub" style="margin-bottom:12px">入力後、「反映する」を押してください。</div>`}function applyBtn(k){return `<button class="btn primary" style="width:100%" onclick="applyField('${k}',document.getElementById('fv').value)">反映する</button>`}
function numberPanel(f,current){let c=Number(current||0),arr=db.masters[f.presets]||[];return `${panelTitle(f.label)}<div class="valuebox"><strong id="numView">${fmt(c)}</strong><span>${f.unit}</span></div><div class="stepper"><button class="btn" onclick="adjustNum(-${f.step})">−</button><input id="fv" class="input" inputmode="decimal" type="number" step="${f.step}" min="${f.min}" max="${f.max}" value="${c}" oninput="syncNum()"><button class="btn" onclick="adjustNum(${f.step})">＋</button></div><div class="sub" style="margin:0 0 8px">${f.step}単位で調整できます。直接入力も可能です。</div><div class="chips" style="flex-wrap:wrap;overflow:visible">${arr.map(v=>`<button class="chip ${+current===v?'on':''}" onclick="setNum(${v})">${fmt(v)}${f.unit}</button>`).join('')}</div>${applyBtn(f.key)}`}
function setNum(v){$('fv').value=v;syncNum()}function adjustNum(d){let n=Number($('fv').value||0)+d;if(n<0)n=0;$('fv').value=Math.round(n*10)/10;syncNum()}function syncNum(){if($('numView'))$('numView').textContent=fmt($('fv').value||0)}function applyField(k,v){let r=draft(),f=reportFields.find(x=>x.key===k);r[k]=f.type==='number'?Number(v):v;db.draft=r;db.dirty=true;save();closePanel();render()}function saveReport(){let r=draft();db.reports=db.reports.filter(x=>!(x.job===db.job&&x.day===db.day));db.reports.push({...r,job:db.job,day:db.day});db.dirty=false;db.draft=structuredClone({...r,job:db.job,day:db.day});save();toast('日報を保存しました');render()}function copyPrev(){let p=rec(db.day-1);if(!p){toast('前日の入力がありません');return}db.draft={...structuredClone(p),day:db.day,job:db.job};db.dirty=true;save();toast('前日をコピーしました');render()}
function listRows(){return reports().map(r=>`<div class="listrow" onclick="db.day=${r.day};go('report')"><b>${r.day}</b><div class="truncate">${r.content||'作業内容なし'}</div><div>${fmt(r.labor)}</div><div>${fmt(r.overtime||0)}h</div></div>`).join('')||'<div class="empty">入力済みの日報がありません。</div>'}function showListSheet(){$('panel').innerHTML=`<div class="title">日報一覧</div><div class="listbox"><div class="listrow head"><div>日</div><div>作業内容</div><div>人工</div><div>残業</div></div>${listRows()}</div>`;$('drawer').classList.add('on')}
function openDatePicker(){let days=Array.from({length:dim()},(_,i)=>i+1);$('panel').innerHTML=`<div class="title">日付を選択</div><div class="field"><label>日付</label><input class="input" type="date" value="${dayText()}" onchange="let p=this.value.split('-');db.month=p[0]+'-'+p[1];closePanel();setDay(Number(p[2]))"></div><div class="chips" style="flex-wrap:wrap;overflow:visible">${days.map(d=>`<button class="chip ${d===db.day?'on':''} ${entered().has(d)?'ok':''}" onclick="closePanel();setDay(${d})">${d}日</button>`).join('')}</div>`;$('drawer').classList.add('on')}
function listPage(){setHeader('日報一覧','今月累計を確認',true);$('saveBar').classList.add('hide');let s=sums(),pct=Math.round(reports().length/dim()*100);return `<div class="card"><div class="title">今月の入力状況</div><div class="sub" style="margin-bottom:10px">${currentJob().name} / ${db.month}</div><div class="progress"><span style="width:${pct}%"></span></div><div class="sub" style="margin-top:6px">${reports().length}/${dim()}日 入力済み</div><div class="grid3" style="margin-top:10px"><div class="stat"><strong>${fmt(s.labor)}</strong><span>人工合計</span></div><div class="stat"><strong>${fmt(s.work)}</strong><span>勤務時間</span></div><div class="stat"><strong>${fmt(s.ot)}</strong><span>残業合計</span></div></div></div><div class="card"><div class="row between"><div class="title">入力済み日報</div><button class="btn sm" onclick="go('report')">入力</button></div><div class="listbox"><div class="listrow head"><div>日</div><div>作業内容</div><div>人工</div><div>残業</div></div>${listRows()}</div></div>`}
function summary(){setHeader('出面表','月末提出用の集計',true);$('saveBar').classList.add('hide');let s=sums(),rows='';for(let d=1;d<=dim();d++){let r=reports().find(x=>x.day===d)||{},l=+r.labor||0;rows+=`<tr><td>${d}</td><td>${l?fmt(l):''}</td><td>${l?fmt(l*8):''}</td><td>${r.overtime?fmt(r.overtime):''}</td><td></td></tr>`}rows+=`<tr class="total"><td>集計</td><td>${fmt(s.labor)}</td><td>${fmt(s.work)}</td><td>${fmt(s.ot)}</td><td></td></tr>`;return `<div class="card"><div class="title">出面表の集計</div><div class="sub" style="margin-bottom:10px">${currentJob().name} / ${db.month}</div><div class="grid3"><div class="stat"><strong>${fmt(s.labor)}</strong><span>人工合計</span></div><div class="stat"><strong>${fmt(s.work)}</strong><span>勤務時間</span></div><div class="stat"><strong>${fmt(s.ot)}</strong><span>残業合計</span></div></div></div><div class="card"><div class="row between"><div><div class="title" style="margin:0">提出前チェック</div><div class="sub">未入力 ${missing()}日</div></div><span class="pill ${missing()?'warn':'ok'}">${missing()?'確認あり':'OK'}</span></div><button class="btn" style="width:100%;margin-top:10px" onclick="go('list')">日報一覧で確認</button></div><div class="card"><div class="row between"><div class="title">出面表</div><button class="btn sm" onclick="window.print()">PDF</button></div><div class="sheetbox"><table class="sheet"><thead><tr><th>月日</th><th>人工数</th><th>勤務時間</th><th>残業</th><th>深夜残業</th></tr></thead><tbody>${rows}</tbody></table></div></div>`}
function roster(){setHeader('作業員名簿','現場ごとに提出者を選択',true);$('saveBar').classList.add('hide');let s=new Set(db.workersSelected);return `<div class="card"><div class="row between"><div><div class="title" style="margin:0">${currentJob().name}</div><div class="sub">${currentJob().client}</div></div><span class="pill">${db.workersSelected.length}名</span></div><div class="stepbar"><span class="on"></span><span class="on"></span><span></span></div><div class="sub">1. 現場確認　2. 作業員選択　3. PDF確認</div></div><div class="card"><div class="title">提出する作業員</div>${db.workers.map(w=>`<label class="item check"><input type="checkbox" ${s.has(w.id)?'checked':''} onchange="toggleWorker('${w.id}',this.checked)"><span><b>${w.name}</b><br><span class="sub">${w.company} / ${w.trade}</span></span><span class="pill ${w.health<'2025-01-01'?'warn':'ok'}">健診</span></label>`).join('')}</div><div class="card"><div class="title">提出前チェック</div><div class="item row between"><span>元請指定様式</span><span class="pill warn">確認待ち</span></div><div class="item row between"><span>健康診断日</span><span class="pill ok">確認対象</span></div><button class="btn primary" style="width:100%" onclick="toast('PDFプレビューは次段階で実装します')">PDFプレビュー</button></div>`}
function toggleWorker(id,on){let s=new Set(db.workersSelected);on?s.add(id):s.delete(id);db.workersSelected=[...s];save();render()}function openContext(){$('panel').innerHTML=`<div class="title">現場・月を変更</div><div class="field"><label>現場</label><select id="ctx_job">${db.jobs.map(x=>`<option value="${x.id}" ${x.id===db.job?'selected':''}>${x.name}</option>`).join('')}</select></div><div class="field"><label>対象月</label><input id="ctx_month" class="input" type="month" value="${db.month}"></div><button class="btn primary" style="width:100%" onclick="db.job=$('ctx_job').value;db.month=$('ctx_month').value;db.draft=null;db.dirty=false;save();closePanel();render();toast('変更しました')">変更する</button>`;$('drawer').classList.add('on')}
function render(){nav();const pages={home,report,list:listPage,summary,roster};$('app').innerHTML=pages[db.screen]()}render();
</script>
</body>
</html>
