<style>
:root{--bg:#f4f6f8;--card:#fff;--ink:#101828;--muted:#667085;--line:#d0d5dd;--brand:#14532d;--brand2:#166534;--soft:#ecfdf3;--blue:#175cd3;--bluebg:#eff8ff;--amber:#b54708;--amberbg:#fffaeb;--red:#b42318;--redbg:#fef3f2;--shadow:0 12px 30px rgba(16,24,40,.08);--r:22px}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:#d9dee6;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;font-size:15px;line-height:1.45}button,input,select,textarea{font:inherit}button{cursor:pointer}b{font-weight:850}.phone{min-height:100dvh;background:var(--bg);padding-bottom:calc(78px + env(safe-area-inset-bottom))}.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 10px) 14px 10px}.toprow{display:flex;align-items:center;justify-content:space-between;gap:10px}.left{display:flex;align-items:center;gap:10px;min-width:0}.logo{width:36px;height:36px;border-radius:14px;background:linear-gradient(135deg,#14532d,#15803d);display:grid;place-items:center;color:#fff;font-weight:950;box-shadow:0 10px 20px rgba(20,83,45,.2)}.back{width:36px;height:36px;border:0;border-radius:999px;background:#f2f4f7;color:#344054;font-size:22px}.top h1{font-size:18px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.top p{font-size:12px;color:var(--muted);margin:1px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mini{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:850;color:#344054;white-space:nowrap}.wrap{max-width:520px;margin:0 auto;padding:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.flat{box-shadow:none}.title{font-size:17px;font-weight:950;margin:0 0 8px}.sub{font-size:12px;color:var(--muted)}.tiny{font-size:11px;color:var(--muted)}.row{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn{border:1px solid var(--line);background:#fff;color:#1f2937;border-radius:16px;min-height:50px;padding:10px 13px;font-weight:900}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn.dark{background:#111827;border-color:#111827;color:#fff}.btn.sm{min-height:36px;padding:7px 10px;border-radius:11px;font-size:12px}.btn.danger{border-color:#fecdca;color:var(--red);background:#fff}.input,select,textarea{width:100%;min-height:50px;border:1px solid #cbd5e1;border-radius:16px;background:#fff;color:var(--ink);padding:12px;outline:none}textarea{min-height:112px;resize:vertical}.field{display:grid;gap:6px;margin-bottom:10px}.field label{font-size:12px;font-weight:850;color:#344054}.pill{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:850;color:#344054;white-space:nowrap}.ok{background:var(--soft);border-color:#bbf7d0;color:var(--brand2)}.warn{background:var(--amberbg);border-color:#fedf89;color:var(--amber)}.bad{background:var(--redbg);border-color:#fecdca;color:var(--red)}.blue{background:var(--bluebg);border-color:#b2ddff;color:var(--blue)}.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,#0d3b26,#166534);border:0;color:#fff;padding:16px}.hero:after{content:"";position:absolute;right:-54px;top:-54px;width:160px;height:160px;border-radius:999px;background:rgba(255,255,255,.1)}.hero .sub,.hero .tiny{color:#d1fadf}.ring{width:76px;height:76px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(#86efac var(--p),rgba(255,255,255,.22) 0);position:relative;flex:0 0 auto}.ring:before{content:"";position:absolute;inset:8px;border-radius:50%;background:#14532d}.ring b{position:relative;font-size:18px}.task{display:grid;grid-template-columns:46px 1fr 24px;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:22px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}.task:active,.item:active,.master:active,.worker:active{background:#f8fafc}.ico{width:46px;height:46px;border-radius:17px;background:var(--soft);color:var(--brand2);display:grid;place-items:center;font-weight:950;font-size:20px}.ico.blue{background:var(--bluebg);color:var(--blue)}.ico.warn{background:var(--amberbg);color:var(--amber)}.chev{font-size:27px;color:#98a2b3}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.stat strong{display:block;font-size:22px;line-height:1}.stat span{font-size:11px;color:var(--muted)}.progress{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,#16a34a,#86efac);border-radius:999px}.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:#fff;border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -8px 22px rgba(16,24,40,.08)}.nav button{border:0;background:#fff;border-radius:14px;min-height:56px;color:#667085;font-size:11px;font-weight:900}.nav button span{display:block;font-size:18px;line-height:1.05;margin-bottom:3px}.nav button.on{background:var(--soft);color:var(--brand2)}.search{display:flex;gap:8px}.chips{display:flex;gap:8px;overflow:auto;padding:2px 0 4px}.chip{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-size:13px;font-weight:900}.chip.on{background:#111827;color:#fff;border-color:#111827}.master{border:1px solid var(--line);background:#fff;border-radius:20px;padding:13px;margin-bottom:9px;box-shadow:0 4px 14px rgba(16,24,40,.04)}.masterTop{display:grid;grid-template-columns:44px 1fr auto;gap:10px;align-items:center}.avatar{width:44px;height:44px;border-radius:16px;background:#f2f4f7;display:grid;place-items:center;font-weight:950;color:#344054}.mname{font-weight:950}.mmeta{font-size:12px;color:var(--muted);margin-top:1px}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.checkLine{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:center;border:1px solid var(--line);background:#fff;border-radius:16px;padding:11px;margin-bottom:8px}.checkLine input{width:24px;height:24px}.stepbar{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}.stepbar span{height:6px;background:#e5e7eb;border-radius:999px}.stepbar span.on{background:var(--brand)}.selectBox{border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px;margin-bottom:9px}.pdfPreview{border:1px solid #98a2b3;border-radius:16px;overflow:auto;background:#fff}.sheet{border-collapse:collapse;min-width:760px;width:100%;font-size:12px}.sheet th,.sheet td{border:1px solid #98a2b3;padding:6px;text-align:left}.sheet th{background:#eef2f6}.bottomAction{position:fixed;left:0;right:0;bottom:0;z-index:31;background:#fff;border-top:1px solid var(--line);box-shadow:0 -8px 22px rgba(16,24,40,.08);padding:8px 12px calc(8px + env(safe-area-inset-bottom))}.bottomInner{max-width:520px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}.bottomInner .full{grid-column:1/3}.drawer{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:50;display:none;align-items:flex-end}.drawer.on{display:flex}.panel{background:#fff;width:100%;max-height:90dvh;overflow:auto;border-radius:26px 26px 0 0;padding:14px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -12px 36px rgba(15,23,42,.22)}.handle{width:46px;height:5px;background:#d0d5dd;border-radius:999px;margin:0 auto 12px}.toast{position:fixed;left:12px;right:12px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:60;background:#111827;color:#fff;border-radius:14px;padding:12px 14px;display:none}.toast.on{display:block}.empty{text-align:center;color:var(--muted);border:1px dashed #cbd5e1;border-radius:16px;background:#fff;padding:18px}.hide{display:none!important}@media(min-width:720px){.phone{width:390px;min-height:820px;margin:18px auto;border:8px solid #111827;border-radius:34px;overflow:hidden;position:relative}.nav,.bottomAction{left:50%;right:auto;transform:translateX(-50%);width:390px;border-radius:0 0 25px 25px}.toast{left:calc(50% - 183px);right:calc(50% - 183px)}}@media print{body{background:#fff}.phone{width:auto!important;border:0!important;margin:0!important;padding:0}.top,.nav,.bottomAction,.drawer,.toast,.btn,.search,.chips{display:none!important}.wrap{max-width:none;padding:0}.card{box-shadow:none;border:0}.sheet{min-width:0;font-size:10px}}
</style>
</head>
<body>
<div class="phone">
<header class="top"><div class="toprow"><div class="left" id="head"></div><button class="mini" onclick="openHelp()">確認</button></div></header>
<main class="wrap" id="app"></main>
<nav class="nav" id="nav"></nav>
<div class="bottomAction hide" id="bottom"></div>
<div class="drawer" id="drawer" onclick="if(event.target.id==='drawer')closePanel()"><div class="panel"><div class="handle"></div><div id="panel"></div></div></div>
<div class="toast" id="toast"></div>
</div>
<script>
const KEY='deme-roster-master-v8';
const seed={screen:'home',workerFilter:'all',siteFilter:'all',query:'',selectedSite:'s1',selectedWorkers:['w1','w2'],workers:[{id:'w1',name:'山田 太郎',kana:'ヤマダ タロウ',company:'自社',trade:'電気工',phone:'090-0000-0001',emergency:'山田花子 090-1111-1111',birth:'1985-04-12',address:'東京都江東区',health:'2025-09-10',insurance:'協会けんぽ',pension:'厚生年金',employment:'雇用保険',licenses:'職長教育・高所作業車'},{id:'w2',name:'佐藤 一郎',kana:'サトウ イチロウ',company:'協力会社A',trade:'設備工',phone:'090-0000-0002',emergency:'佐藤美紀 090-2222-2222',birth:'1979-10-02',address:'埼玉県川口市',health:'2025-07-03',insurance:'協会けんぽ',pension:'厚生年金',employment:'雇用保険',licenses:'玉掛け'},{id:'w3',name:'鈴木 健',kana:'スズキ ケン',company:'協力会社B',trade:'内装工',phone:'090-0000-0003',emergency:'',birth:'1992-03-18',address:'千葉県船橋市',health:'2024-11-20',insurance:'国保',pension:'国民年金',employment:'未確認',licenses:'足場特別教育'},{id:'w4',name:'高橋 誠',kana:'タカハシ マコト',company:'自社',trade:'電気工',phone:'090-0000-0004',emergency:'高橋舞 090-4444-4444',birth:'1988-07-21',address:'東京都足立区',health:'2025-12-11',insurance:'協会けんぽ',pension:'厚生年金',employment:'雇用保険',licenses:'第二種電気工事士'}],sites:[{id:'s1',name:'青葉マンション改修工事',client:'青葉建設',format:'元請指定様式A',address:'東京都中央区',period:'2026/06/01〜2026/08/31',manager:'高橋所長',status:'稼働中'},{id:'s2',name:'南町ビル設備更新',client:'南町開発',format:'元請指定様式B',address:'神奈川県横浜市',period:'2026/07/01〜2026/09/15',manager:'田中所長',status:'稼働中'},{id:'s3',name:'北口店舗原状回復',client:'北口不動産',format:'未確認',address:'東京都北区',period:'2026/08/01〜2026/08/20',manager:'',status:'準備中'}],siteWorkers:{s1:{w1:{entry:'2026-06-01',role:'作業員',sendEdu:'2026-05-28',acceptEdu:'2026-06-01'},w2:{entry:'2026-06-01',role:'職長',sendEdu:'2026-05-29',acceptEdu:'2026-06-01'}},s2:{},s3:{}}};
let db=JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(seed);const $=id=>document.getElementById(id);const save=()=>localStorage.setItem(KEY,JSON.stringify(db));
const workerRequired=['name','kana','company','trade','phone','emergency','birth','address','health','insurance','pension','employment','licenses'];
const siteRequired=['name','client','format','address','period','manager'];
function selectedSite(){return db.sites.find(s=>s.id===db.selectedSite)||db.sites[0]}function selectedWorkers(){return db.workers.filter(w=>db.selectedWorkers.includes(w.id))}function siteMap(){db.siteWorkers[db.selectedSite]=db.siteWorkers[db.selectedSite]||{};return db.siteWorkers[db.selectedSite]}function siteInfo(wid){return siteMap()[wid]||{entry:'',role:'作業員',sendEdu:'',acceptEdu:''}}function missingMaster(obj,fields){return fields.filter(f=>!obj[f]||obj[f]==='未確認'||obj[f]==='未確認様式')}function workerIssues(w){let a=missingMaster(w,workerRequired);if(w.health&&w.health<'2025-01-01')a.push('healthOld');return [...new Set(a)]}function siteIssues(s){return missingMaster(s,siteRequired)}function siteWorkerIssues(wid){let x=siteInfo(wid),a=[];if(!x.entry)a.push('entry');if(!x.sendEdu)a.push('sendEdu');if(!x.acceptEdu)a.push('acceptEdu');return a}function workerScore(w){return Math.max(0,Math.round((workerRequired.length-workerIssues(w).length)/workerRequired.length*100))}function siteScore(s){return Math.max(0,Math.round((siteRequired.length-siteIssues(s).length)/siteRequired.length*100))}function pdfIssues(){let n=siteIssues(selectedSite()).length;selectedWorkers().forEach(w=>{n+=workerIssues(w).length+nSite(w.id)});return n}function nSite(id){return siteWorkerIssues(id).length}function pdfScore(){let all=1+selectedWorkers().length;if(!selectedWorkers().length)return 0;let bad=(siteIssues(selectedSite()).length?1:0)+selectedWorkers().filter(w=>workerIssues(w).length||nSite(w.id)).length;return Math.max(0,Math.round((all-bad)/all*100))}function toast(t){$('toast').textContent=t;$('toast').classList.add('on');setTimeout(()=>$('toast').classList.remove('on'),1500)}function closePanel(){$('drawer').classList.remove('on')}function head(t,s,back=false){$('head').innerHTML=`${back?'<button class="back" onclick="go(\'home\')">‹</button>':'<div class="logo">名</div>'}<div style="min-width:0"><h1>${t}</h1><p>${s||''}</p></div>`}function nav(){let items=[['home','ホーム','⌂'],['workers','作業員','人'],['sites','現場','現'],['builder','PDF作成','PDF'],['check','確認','✓']];$('nav').innerHTML=items.map(i=>`<button class="${db.screen===i[0]?'on':''}" onclick="go('${i[0]}')"><span>${i[2]}</span>${i[1]}</button>`).join('')}function go(s){db.screen=s;save();render()}function bottom(html){$('bottom').innerHTML=html||'';$('bottom').classList.toggle('hide',!html)}
function home(){head('名簿作成','マスターを組み合わせてPDF化');bottom('');let ws=db.workers.filter(w=>workerIssues(w).length).length,ss=db.sites.filter(s=>siteIssues(s).length).length,score=Math.round((workerMasterScore()+siteMasterScore()+pdfScore())/3);return `<div class="card hero"><div class="row between"><div><div class="sub">作業員マスター × 現場マスター</div><div class="title">名簿PDF作成</div><div class="tiny">登録済み情報を選んで、提出前チェックまで行います。</div></div><div class="ring" style="--p:${score}%"><b>${score}%</b></div></div></div><div class="grid3"><div class="stat"><strong>${db.workers.length}</strong><span>作業員</span></div><div class="stat"><strong>${db.sites.length}</strong><span>現場</span></div><div class="stat"><strong>${pdfIssues()}</strong><span>確認事項</span></div></div><div class="task" onclick="go('workers')"><div class="ico">人</div><div><b>作業員マスター</b><div class="sub">基本情報・保険・資格・健康診断</div></div><div class="chev">›</div></div><div class="task" onclick="go('sites')"><div class="ico blue">現</div><div><b>現場マスター</b><div class="sub">元請・様式・住所・工期・担当者</div></div><div class="chev">›</div></div><div class="task" onclick="go('builder')"><div class="ico warn">PDF</div><div><b>名簿PDFを作る</b><div class="sub">現場と作業員を選んでPDF化</div></div><div class="chev">›</div></div><div class="task" onclick="go('check')"><div class="ico">✓</div><div><b>不足チェック</b><div class="sub">何が足りないかを先に確認</div></div><div class="chev">›</div></div><div class="card flat"><div class="row between"><div><b>マスターの状態</b><div class="sub">作業員 ${ws}名、現場 ${ss}件に確認事項があります。</div></div><span class="pill ${ws||ss?'warn':'ok'}">${ws||ss?'要確認':'OK'}</span></div></div>`}
function workerMasterScore(){let s=db.workers.reduce((a,w)=>a+workerScore(w),0);return Math.round(s/db.workers.length)}function siteMasterScore(){let s=db.sites.reduce((a,x)=>a+siteScore(x),0);return Math.round(s/db.sites.length)}
function workers(){head('作業員マスター','登録・修正・確認',true);bottom(`<div class="bottomInner"><button class="btn" onclick="go('home')">戻る</button><button class="btn primary" onclick="openWorkerForm()">新規追加</button></div>`);let list=filteredWorkers();return `<div class="card"><div class="search"><input class="input" placeholder="氏名・会社・職種で検索" value="${db.query}" oninput="db.query=this.value;save();render()"><button class="btn" onclick="db.query='';save();render()">消</button></div><div class="chips" style="margin-top:10px">${chip('all','全員','workerFilter')}${chip('missing','要確認','workerFilter')}${chip('own','自社','workerFilter')}${chip('partner','協力会社','workerFilter')}</div></div>${list.map(workerCard).join('')||'<div class="empty">該当する作業員がいません。</div>'}`}
function chip(k,t,key){return `<button class="chip ${db[key]===k?'on':''}" onclick="db.${key}='${k}';save();render()">${t}</button>`}function filteredWorkers(){let q=(db.query||'').toLowerCase();return db.workers.filter(w=>{let ok=true;if(db.workerFilter==='missing')ok=workerIssues(w).length>0;if(db.workerFilter==='own')ok=w.company==='自社';if(db.workerFilter==='partner')ok=w.company!=='自社';if(q)ok=(w.name+w.kana+w.company+w.trade).toLowerCase().includes(q);return ok})}
function workerCard(w){let miss=workerIssues(w);return `<div class="master" onclick="openWorker('${w.id}')"><div class="masterTop"><div class="avatar">${w.name[0]}</div><div><div class="mname">${w.name}</div><div class="mmeta">${w.company} / ${w.trade}</div></div><span class="pill ${miss.length?'warn':'ok'}">${miss.length?miss.length+'件':'OK'}</span></div><div class="badges"><span class="pill blue">${workerScore(w)}%</span><span class="pill">健診 ${w.health||'未入力'}</span><span class="pill">${w.insurance||'保険未入力'}</span></div></div>`}
function sites(){head('現場マスター','提出先・様式・工期を管理',true);bottom(`<div class="bottomInner"><button class="btn" onclick="go('home')">戻る</button><button class="btn primary" onclick="openSiteForm()">新規追加</button></div>`);return `<div class="card"><div class="chips">${chip('all','全件','siteFilter')}${chip('missing','要確認','siteFilter')}${chip('active','稼働中','siteFilter')}</div></div>${filteredSites().map(siteCard).join('')}`}
function filteredSites(){return db.sites.filter(s=>{if(db.siteFilter==='missing')return siteIssues(s).length>0;if(db.siteFilter==='active')return s.status==='稼働中';return true})}function siteCard(s){let m=siteIssues(s);return `<div class="master" onclick="selectSite('${s.id}')"><div class="masterTop"><div class="avatar">現</div><div><div class="mname">${s.name}</div><div class="mmeta">${s.client} / ${s.period}</div></div><span class="pill ${m.length?'warn':'ok'}">${m.length?m.length+'件':'OK'}</span></div><div class="badges"><span class="pill blue">${siteScore(s)}%</span><span class="pill">${s.format||'様式未入力'}</span><span class="pill">${s.status}</span></div></div>`}
function selectSite(id){db.selectedSite=id;save();openSite(id)}
function builder(){head('PDF作成','現場と作業員を選んで作成',true);bottom(`<div class="bottomInner"><button class="btn" onclick="go('check')">不足確認</button><button class="btn primary" onclick="go('check')">PDF確認へ</button></div>`);let s=selectedSite();return `<div class="card"><div class="title">1. 現場を選択</div>${db.sites.map(x=>`<div class="selectBox row between" onclick="db.selectedSite='${x.id}';save();render()"><div><b>${x.name}</b><div class="sub">${x.client} / ${x.format}</div></div><span class="pill ${db.selectedSite===x.id?'ok':'blue'}">${db.selectedSite===x.id?'選択中':'選ぶ'}</span></div>`).join('')}</div><div class="card"><div class="title">2. 作業員を選択</div>${db.workers.map(w=>`<label class="checkLine"><input type="checkbox" ${db.selectedWorkers.includes(w.id)?'checked':''} onchange="toggleWorker('${w.id}',this.checked)"><span><b>${w.name}</b><br><span class="sub">${w.company} / ${w.trade}</span></span><span class="pill ${workerIssues(w).length?'warn':'ok'}">${workerIssues(w).length?'確認':'OK'}</span></label>`).join('')}</div><div class="card"><div class="title">3. PDF作成前の状態</div><div class="grid3"><div class="stat"><strong>${selectedWorkers().length}</strong><span>対象者</span></div><div class="stat"><strong>${pdfIssues()}</strong><span>確認事項</span></div><div class="stat"><strong>${pdfScore()}%</strong><span>準備率</span></div></div><div class="progress" style="margin-top:10px"><span style="width:${pdfScore()}%"></span></div></div>`}
function toggleWorker(id,on){let s=new Set(db.selectedWorkers);on?s.add(id):s.delete(id);db.selectedWorkers=[...s];save();render()}
function check(){head('不足チェック','PDF作成前に確認',true);bottom(`<div class="bottomInner"><button class="btn" onclick="go('builder')">選択へ戻る</button><button class="btn primary" onclick="previewPdf()">PDFプレビュー</button></div>`);let s=selectedSite();return `<div class="card"><div class="row between"><div><div class="title" style="margin:0">${s.name}</div><div class="sub">${s.client} / 対象者 ${selectedWorkers().length}名</div></div><span class="pill ${pdfIssues()?'warn':'ok'}">${pdfIssues()?pdfIssues()+'件':'OK'}</span></div><div class="progress" style="margin-top:10px"><span style="width:${pdfScore()}%"></span></div></div>${siteCheckCard(s)}${selectedWorkers().map(workerCheckCard).join('')||'<div class="empty">作業員が選択されていません。</div>'}`}
function label(k){return {name:'氏名',kana:'フリガナ',company:'所属会社',trade:'職種',phone:'電話番号',emergency:'緊急連絡先',birth:'生年月日',address:'住所',health:'健康診断日',insurance:'健康保険',pension:'年金',employment:'雇用保険',licenses:'資格・教育',format:'提出様式',client:'元請',period:'工期',manager:'現場担当者',entry:'入場日',sendEdu:'送り出し教育日',acceptEdu:'受入教育日',healthOld:'健康診断日が古い'}[k]||k}
function siteCheckCard(s){let m=siteIssues(s);return `<div class="card"><div class="row between"><div><b>現場マスター</b><div class="sub">${s.name}</div></div><span class="pill ${m.length?'warn':'ok'}">${m.length?m.length+'件':'OK'}</span></div>${m.length?m.map(x=>`<div class="checkLine"><span>!</span><span>${label(x)}が未入力です</span><button class="btn sm" onclick="openSite('${s.id}')">修正</button></div>`).join(''):'<div class="sub">不足はありません。</div>'}</div>`}
function workerCheckCard(w){let m=[...workerIssues(w),...siteWorkerIssues(w.id)];return `<div class="card"><div class="row between"><div><b>${w.name}</b><div class="sub">${w.company} / ${w.trade}</div></div><span class="pill ${m.length?'warn':'ok'}">${m.length?m.length+'件':'OK'}</span></div>${m.length?m.map(x=>`<div class="checkLine"><span>!</span><span>${label(x)}を確認してください</span><button class="btn sm" onclick="${['entry','sendEdu','acceptEdu'].includes(x)?`openSiteWorker('${w.id}')`:`openWorker('${w.id}')`}">修正</button></div>`).join(''):'<div class="sub">不足はありません。</div>'}</div>`}
function previewPdf(){let s=selectedSite();$('panel').innerHTML=`<div class="title">名簿プレビュー</div><div class="sub" style="margin-bottom:10px">${s.name} / ${s.client}</div><div class="pdfPreview"><table class="sheet"><thead><tr><th>No</th><th>氏名</th><th>会社</th><th>職種</th><th>入場日</th><th>健診日</th><th>保険</th><th>資格</th></tr></thead><tbody>${selectedWorkers().map((w,i)=>{let sw=siteInfo(w.id);return `<tr><td>${i+1}</td><td>${w.name}<br>${w.kana}</td><td>${w.company}</td><td>${w.trade}</td><td>${sw.entry||''}</td><td>${w.health||''}</td><td>${w.insurance||''}</td><td>${w.licenses||''}</td></tr>`}).join('')}</tbody></table></div><button class="btn primary" style="width:100%;margin-top:12px" onclick="toast('PDF出力は次フェーズで実装します')">PDF作成</button>`;$('drawer').classList.add('on')}
function openWorker(id){let w=db.workers.find(x=>x.id===id);$('panel').innerHTML=`<div class="title">作業員マスター</div>${fieldView('氏名',w.name)}${fieldView('所属・職種',w.company+' / '+w.trade)}${fieldView('電話',w.phone)}${fieldView('緊急連絡先',w.emergency)}${fieldView('健康診断日',w.health)}${fieldView('保険',w.insurance+' / '+w.pension+' / '+w.employment)}${fieldView('資格・教育',w.licenses)}<button class="btn primary" style="width:100%" onclick="openWorkerForm('${id}')">編集する</button>`;$('drawer').classList.add('on')}
function fieldView(t,v){return `<div class="field"><label>${t}</label><div class="input" style="height:auto;min-height:50px">${v||'未入力'}</div></div>`}
function openWorkerForm(id){let w=id?db.workers.find(x=>x.id===id):{id:'w'+Date.now(),name:'',kana:'',company:'自社',trade:'',phone:'',emergency:'',birth:'',address:'',health:'',insurance:'',pension:'',employment:'',licenses:''};$('panel').innerHTML=`<div class="title">作業員を${id?'編集':'追加'}</div>${input('name','氏名',w.name)}${input('kana','フリガナ',w.kana)}${input('company','所属会社',w.company)}${input('trade','職種',w.trade)}${input('phone','電話番号',w.phone)}${input('emergency','緊急連絡先',w.emergency)}${input('birth','生年月日',w.birth,'date')}${input('address','住所',w.address)}${input('health','健康診断日',w.health,'date')}${input('insurance','健康保険',w.insurance)}${input('pension','年金',w.pension)}${input('employment','雇用保険',w.employment)}<div class="field"><label>資格・教育</label><textarea id="licenses" class="input">${w.licenses||''}</textarea></div><button class="btn primary" style="width:100%" onclick="saveWorker('${w.id}',${!!id})">保存する</button>`;$('drawer').classList.add('on')}
function input(id,label,value,type='text'){return `<div class="field"><label>${label}</label><input id="${id}" class="input" type="${type}" value="${value||''}"></div>`}
function saveWorker(id,exists){let w={id,name:$('name').value,kana:$('kana').value,company:$('company').value,trade:$('trade').value,phone:$('phone').value,emergency:$('emergency').value,birth:$('birth').value,address:$('address').value,health:$('health').value,insurance:$('insurance').value,pension:$('pension').value,employment:$('employment').value,licenses:$('licenses').value};if(exists){Object.assign(db.workers.find(x=>x.id===id),w)}else{db.workers.push(w)}save();closePanel();toast('保存しました');render()}
function openSite(id){let s=db.sites.find(x=>x.id===id);$('panel').innerHTML=`<div class="title">現場マスター</div>${fieldView('現場名',s.name)}${fieldView('元請',s.client)}${fieldView('提出様式',s.format)}${fieldView('住所',s.address)}${fieldView('工期',s.period)}${fieldView('担当者',s.manager)}<button class="btn primary" style="width:100%" onclick="openSiteForm('${id}')">編集する</button>`;$('drawer').classList.add('on')}
function openSiteForm(id){let s=id?db.sites.find(x=>x.id===id):{id:'s'+Date.now(),name:'',client:'',format:'',address:'',period:'',manager:'',status:'準備中'};$('panel').innerHTML=`<div class="title">現場を${id?'編集':'追加'}</div>${input('s_name','現場名',s.name)}${input('s_client','元請',s.client)}${input('s_format','提出様式',s.format)}${input('s_address','住所',s.address)}${input('s_period','工期',s.period)}${input('s_manager','担当者',s.manager)}${input('s_status','状態',s.status)}<button class="btn primary" style="width:100%" onclick="saveSite('${s.id}',${!!id})">保存する</button>`;$('drawer').classList.add('on')}
function saveSite(id,exists){let s={id,name:$('s_name').value,client:$('s_client').value,format:$('s_format').value,address:$('s_address').value,period:$('s_period').value,manager:$('s_manager').value,status:$('s_status').value};if(exists){Object.assign(db.sites.find(x=>x.id===id),s)}else{db.sites.push(s)}save();closePanel();toast('保存しました');render()}
function openSiteWorker(id){let w=db.workers.find(x=>x.id===id),sw=siteInfo(id);$('panel').innerHTML=`<div class="title">現場別項目</div><div class="sub" style="margin-bottom:12px">${w.name} / ${selectedSite().name}</div>${input('entry','入場日',sw.entry,'date')}<div class="field"><label>役割</label><select id="role" class="input"><option ${sw.role==='作業員'?'selected':''}>作業員</option><option ${sw.role==='職長'?'selected':''}>職長</option><option ${sw.role==='現場代理人'?'selected':''}>現場代理人</option></select></div>${input('sendEdu','送り出し教育日',sw.sendEdu,'date')}${input('acceptEdu','受入教育日',sw.acceptEdu,'date')}<button class="btn primary" style="width:100%" onclick="saveSiteWorker('${id}')">保存する</button>`;$('drawer').classList.add('on')}
function saveSiteWorker(id){siteMap()[id]={entry:$('entry').value,role:$('role').value,sendEdu:$('sendEdu').value,acceptEdu:$('acceptEdu').value};save();closePanel();toast('保存しました');render()}
function openHelp(){$('panel').innerHTML=`<div class="title">この画面の考え方</div><div class="card flat"><b>作業員マスター</b><div class="sub">人に紐づく基本情報。現場が変わっても基本的に使い回します。</div></div><div class="card flat"><b>現場マスター</b><div class="sub">元請・様式・工期など、現場に紐づく情報です。</div></div><div class="card flat"><b>PDF作成</b><div class="sub">現場と作業員を選び、不足を確認してPDF化します。</div></div>`;$('drawer').classList.add('on')}
function render(){nav();let pages={home,workers,sites,builder,check};$('app').innerHTML=pages[db.screen]()}render();
</script>
</body>
</html>
