<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>現場日報・出面管理 UX100版</title>
<style>
:root{--bg:#eef1f4;--card:#fff;--ink:#101828;--sub:#667085;--line:#d0d5dd;--main:#14532d;--main2:#166534;--soft:#ecfdf3;--yellow:#fffaeb;--red:#fef3f2;--blue:#eff8ff;--radius:18px;--shadow:0 10px 24px rgba(16,24,40,.09)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#d7dce3;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;font-size:15px;line-height:1.45}button,input,select,textarea{font:inherit}button{cursor:pointer}.phone{min-height:100dvh;background:var(--bg);padding-bottom:calc(76px + env(safe-area-inset-bottom))}.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 10px) 14px 10px}.toprow{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;gap:9px;align-items:center}.logo{width:34px;height:34px;border-radius:11px;background:var(--main);color:#fff;display:grid;place-items:center;font-weight:900}.top h1{margin:0;font-size:18px}.top p{margin:1px 0 0;color:var(--sub);font-size:12px}.badge{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);border-radius:999px;background:#fff;padding:5px 9px;font-size:12px;font-weight:800;color:#344054}.wrap{max-width:520px;margin:0 auto;padding:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.plain{box-shadow:none}.title{font-weight:900;font-size:17px;margin:0 0 9px}.cap{color:var(--sub);font-size:12px}.small{font-size:12px}.row{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.field{display:grid;gap:5px}.field label{font-size:12px;color:#344054;font-weight:850}.input,select,textarea{width:100%;min-height:48px;border:1px solid #cbd5e1;border-radius:13px;background:#fff;color:var(--ink);padding:11px;outline:none}textarea{min-height:92px;resize:vertical}.btn{border:1px solid var(--line);background:#fff;color:#1f2937;border-radius:14px;min-height:48px;padding:10px 13px;font-weight:900}.btn.primary{background:var(--main);border-color:var(--main);color:#fff}.btn.dark{background:#111827;border-color:#111827;color:#fff}.btn.subtle{background:#f9fafb}.btn.sm{min-height:36px;padding:6px 10px;border-radius:11px;font-size:12px}.hero{background:linear-gradient(135deg,#14532d,#166534);color:#fff;border:0}.hero .cap{color:#d1fadf}.bigTask{display:grid;grid-template-columns:42px 1fr 24px;align-items:center;gap:12px;border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px;margin-bottom:10px}.bigTask:active,.item:active{background:#f9fafb}.num{width:42px;height:42px;border-radius:14px;background:var(--soft);color:var(--main2);display:grid;place-items:center;font-weight:950;font-size:18px}.bigTask b{display:block;font-size:16px}.chev{font-size:25px;color:#98a2b3}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}.stat strong{display:block;font-size:23px;line-height:1}.stat span{font-size:11px;color:var(--sub)}.pill{display:inline-flex;align-items:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:850;color:#344054}.ok{background:var(--soft);border-color:#bbf7d0;color:#166534}.warn{background:var(--yellow);border-color:#fedf89;color:#b54708}.bad{background:var(--red);border-color:#fecdca;color:#b42318}.blue{background:var(--blue);border-color:#b2ddff;color:#175cd3}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:2px}.chip{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;font-size:13px;font-weight:850}.chip.on{background:#111827;color:#fff;border-color:#111827}.item{border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px;margin-bottom:9px}.day{display:grid;grid-template-columns:44px 1fr auto;gap:10px;align-items:center}.daybox{width:44px;height:44px;border-radius:14px;background:#f2f4f7;display:grid;place-items:center;font-weight:950}.day.done .daybox{background:var(--soft);color:var(--main2)}.stepbar{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:6px 0 10px}.step{height:5px;background:#e4e7ec;border-radius:999px}.step.on{background:var(--main)}.notice{border-left:5px solid var(--main);background:#fff;padding:12px;border-radius:13px;border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:12px}.sheetbox{overflow:auto;border:1px solid #98a2b3;border-radius:12px;background:#fff}.sheet{border-collapse:collapse;min-width:720px;width:100%;font-size:12px}.sheet th,.sheet td{border:1px solid #98a2b3;padding:5px}.sheet th{background:#eef2f6}.sheet .total td{background:#fff3bf;font-weight:900}.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:#fff;border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -8px 22px rgba(16,24,40,.08)}.nav button{border:0;background:#fff;border-radius:13px;min-height:54px;color:#667085;font-size:11px;font-weight:900}.nav button span{display:block;font-size:18px;line-height:1.05;margin-bottom:3px}.nav button.on{background:var(--soft);color:var(--main2)}.drawer{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:50;display:none;align-items:flex-end}.drawer.on{display:flex}.panel{width:100%;max-height:92dvh;overflow:auto;background:#fff;border-radius:24px 24px 0 0;padding:12px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -10px 35px rgba(15,23,42,.22)}.handle{width:46px;height:5px;border-radius:999px;background:#d0d5dd;margin:0 auto 12px}.toast{position:fixed;left:12px;right:12px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:60;background:#111827;color:#fff;border-radius:14px;padding:12px 14px;display:none}.toast.on{display:block}.fixedAction{position:sticky;bottom:0;background:#fff;padding-top:10px;margin-top:10px}.empty{text-align:center;color:var(--sub);border:1px dashed #cbd5e1;border-radius:16px;background:#fff;padding:18px}.search{display:flex;gap:8px}.search input{flex:1}@media(min-width:720px){.phone{width:390px;min-height:820px;margin:18px auto;border:8px solid #111827;border-radius:34px;overflow:hidden;position:relative}.nav{left:50%;right:auto;transform:translateX(-50%);width:390px;border-radius:0 0 25px 25px}.toast{left:calc(50% - 183px);right:calc(50% - 183px)}}@media print{body{background:#fff}.phone{width:auto!important;border:0!important;margin:0!important;padding:0}.top,.nav,.btn,.drawer,.toast,.tabs{display:none!important}.wrap{max-width:none;padding:0}.card{box-shadow:none;border:0}.sheet{min-width:0;font-size:10px}}
</style>
</head>
<body>
<div class="phone">
<header class="top"><div class="toprow"><div class="brand"><div class="logo">現</div><div><h1 id="ttl">ホーム</h1><p id="sub">説明なしで使える導線に調整中</p></div></div><span class="badge">UX100版</span></div></header>
<main class="wrap" id="app"></main>
<nav class="nav" id="nav"></nav>
<div class="drawer" id="drawer" onclick="if(event.target.id==='drawer')closePanel()"><div class="panel"><div class="handle"></div><div id="panel"></div></div></div>
<div class="toast" id="toast"></div>
</div>
<script>
const KEY='deme-ux100-v1';
const seed={tab:'home',job:'j1',month:'2026-06',selected:['w1','w2'],jobs:[{id:'j1',name:'青葉マンション改修工事',client:'青葉建設',manager:'高橋所長',status:'稼働中'},{id:'j2',name:'南町ビル設備更新',client:'南町開発',manager:'田中所長',status:'稼働中'}],workers:[{id:'w1',name:'山田 太郎',kana:'ヤマダ タロウ',company:'自社',trade:'電気工',health:'2025-09-10',ins:'協会けんぽ',license:'職長教育・高所作業車',phone:'090-0000-0001'},{id:'w2',name:'佐藤 一郎',kana:'サトウ イチロウ',company:'協力会社A',trade:'設備工',health:'2025-07-03',ins:'協会けんぽ',license:'玉掛け',phone:'090-0000-0002'},{id:'w3',name:'鈴木 健',kana:'スズキ ケン',company:'協力会社B',trade:'内装工',health:'2024-11-20',ins:'国保',license:'足場特別教育',phone:'090-0000-0003'}],reports:[{day:1,job:'j1',content:'共用部配線・既設確認',labor:2,overtime:1,car:1,distance:18,note:'2名対応'},{day:2,job:'j1',content:'器具取付',labor:1.5,overtime:0,car:1,distance:18,note:''},{day:4,job:'j1',content:'盤まわり確認',labor:1,overtime:.5,car:0,distance:0,note:'午後から'}],masters:{labor:[0.5,1,1.5,2,2.5,3],ot:[0,0.5,1,1.5,2,3],company:['自社','協力会社A','協力会社B'],trade:['電気工','設備工','内装工','大工'],ins:['協会けんぽ','国保','未加入']}};
let db=JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(seed);let editDay=null,editWorker=null;const $=id=>document.getElementById(id);const save=()=>localStorage.setItem(KEY,JSON.stringify(db));
function job(){return db.jobs.find(j=>j.id===db.job)||db.jobs[0]}function reports(){return db.reports.filter(r=>r.job===db.job).sort((a,b)=>a.day-b.day)}function dim(){let [y,m]=db.month.split('-').map(Number);return new Date(y,m,0).getDate()}function sums(){return reports().reduce((a,r)=>{a.labor+=+r.labor||0;a.ot+=+r.overtime||0;a.car+=+r.car||0;a.dist+=+r.distance||0;return a},{labor:0,ot:0,car:0,dist:0,get work(){return this.labor*8}})}function missing(){let s=new Set(reports().map(r=>r.day)),n=0;for(let i=1;i<=dim();i++)if(!s.has(i))n++;return n}function toast(t){$('toast').textContent=t;$('toast').classList.add('on');setTimeout(()=>$('toast').classList.remove('on'),1500)}function closePanel(){$('drawer').classList.remove('on')}function setTitle(t,s){$('ttl').textContent=t;$('sub').textContent=s||''}
function nav(){const a=[['home','ホーム','⌂'],['report','日報','✎'],['roster','名簿','人'],['summary','出面','表'],['workers','作業員','名']];$('nav').innerHTML=a.map(x=>`<button class="${db.tab===x[0]?'on':''}" onclick="go('${x[0]}')"><span>${x[2]}</span>${x[1]}</button>`).join('')}function go(t){db.tab=t;save();render()}function context(){return `<div class="grid2"><div class="field"><label>現場</label><select onchange="db.job=this.value;save();render()">${db.jobs.map(j=>`<option value="${j.id}" ${db.job===j.id?'selected':''}>${j.name}</option>`).join('')}</select></div><div class="field"><label>対象月</label><input class="input" type="month" value="${db.month}" onchange="db.month=this.value;save();render()"></div></div>`}
function home(){setTitle('ホーム','まず押すボタンを3つに固定');let s=sums();return `<div class="card hero"><div class="title">現場でやることを選ぶ</div><div class="cap">説明を読まなくても、下の3つから始められるようにしました。</div></div><div class="bigTask" onclick="go('report')"><div class="num">1</div><div><b>紙の日報を入力</b><div class="cap">日付・作業内容・人工・残業</div></div><div class="chev">›</div></div><div class="bigTask" onclick="go('roster')"><div class="num">2</div><div><b>元請へ名簿を出す</b><div class="cap">現場別に作業員を選んで確認</div></div><div class="chev">›</div></div><div class="bigTask" onclick="go('summary')"><div class="num">3</div><div><b>月末の出面表を見る</b><div class="cap">日報データから自動集計</div></div><div class="chev">›</div></div><div class="card"><div class="row between"><div><div class="title" style="margin:0">${job().name}</div><div class="cap">${job().client} / ${db.month}</div></div><span class="pill ok">${job().status}</span></div></div><div class="grid3"><div class="stat"><strong>${reports().length}</strong><span>入力日</span></div><div class="stat"><strong>${s.labor}</strong><span>人工</span></div><div class="stat"><strong>${missing()}</strong><span>未入力</span></div></div>`}
function report(){setTitle('日報入力','紙と同じ順番で1日ずつ入力');let rs=reports();return `<div class="card">${context()}<div class="notice"><b>入力順</b><br><span class="cap">日付 → 作業内容 → 人工 → 残業 → 車両 → 距離 → 備考 → 保存</span></div><button class="btn primary" style="width:100%" onclick="openReport()">＋ 1日分の日報を入力する</button></div><div class="grid3"><div class="stat"><strong>${rs.length}</strong><span>入力済</span></div><div class="stat"><strong>${sums().labor}</strong><span>人工</span></div><div class="stat"><strong>${sums().ot}</strong><span>残業H</span></div></div><div class="card"><div class="row between"><div class="title">日付から修正</div><span class="pill ${missing()? 'warn':'ok'}">未入力 ${missing()}日</span></div><div class="tabs">${Array.from({length:dim()},(_,i)=>i+1).map(d=>`<button class="chip ${rs.some(r=>r.day===d)?'on':''}" onclick="openReport(${d})">${d}日</button>`).join('')}</div></div><div class="card"><div class="title">入力済み日報</div>${rs.map(r=>`<div class="item day done" onclick="openReport(${r.day})"><div class="daybox">${r.day}</div><div><b>${r.content||'作業内容未入力'}</b><div class="cap">人工 ${r.labor} / 残業 ${r.overtime||0}H / 車両 ${r.car||0} / 距離 ${r.distance||0}km</div></div><span class="pill ok">済</span></div>`).join('')||'<div class="empty">まだ日報がありません。</div>'}</div>`}
function openReport(day){let r=db.reports.find(x=>x.job===db.job&&x.day===day)||{day:day||1,job:db.job,content:'',labor:1,overtime:0,car:0,distance:0,note:''};editDay=day||null;$('panel').innerHTML=`<div class="row between"><div><div class="title">1日分の日報</div><div class="cap">${job().name}</div></div><span class="pill blue">${db.month}</span></div><div class="field"><label>日付</label><input id="r_day" class="input" type="number" min="1" max="31" value="${r.day}"></div><div class="field"><label>作業内容</label><textarea id="r_content" placeholder="例：共用部配線、器具取付">${r.content||''}</textarea></div><div class="field"><label>人工</label><div class="tabs">${db.masters.labor.map(v=>`<button class="chip ${+r.labor===v?'on':''}" onclick="setv('r_labor','${v}',this)">${v}</button>`).join('')}</div><input id="r_labor" type="hidden" value="${r.labor}"></div><div class="field"><label>残業H</label><div class="tabs">${db.masters.ot.map(v=>`<button class="chip ${+r.overtime===v?'on':''}" onclick="setv('r_ot','${v}',this)">${v}</button>`).join('')}</div><input id="r_ot" type="hidden" value="${r.overtime||0}"></div><div class="grid2"><div class="field"><label>車両</label><input id="r_car" class="input" type="number" value="${r.car||0}"></div><div class="field"><label>距離数 km</label><input id="r_dist" class="input" type="number" value="${r.distance||0}"></div></div><div class="field"><label>備考</label><input id="r_note" class="input" value="${r.note||''}"></div><div class="fixedAction"><button class="btn primary" style="width:100%" onclick="saveReport()">保存する</button>${editDay?`<button class="btn" style="width:100%;margin-top:8px" onclick="copyNext(${editDay})">この内容を翌日にコピー</button>`:''}</div>`;$('drawer').classList.add('on')}
function setv(id,v,btn){$(id).value=v;btn.parentElement.querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));btn.classList.add('on')}function val(id){return $(id).value}function saveReport(){let d=+val('r_day');db.reports=db.reports.filter(r=>!(r.job===db.job&&r.day===editDay));db.reports.push({day:d,job:db.job,content:val('r_content'),labor:+val('r_labor'),overtime:+val('r_ot'),car:+val('r_car'),distance:+val('r_dist'),note:val('r_note')});save();closePanel();toast('日報を保存しました');render()}function copyNext(day){let r=db.reports.find(x=>x.job===db.job&&x.day===day);if(!r)return;db.reports=db.reports.filter(x=>!(x.job===db.job&&x.day===day+1));db.reports.push({...r,day:day+1});save();closePanel();toast('翌日にコピーしました');render()}
function roster(){setTitle('作業員名簿','現場ごとに選んで提出前確認');let selected=new Set(db.selected);let warn=db.workers.filter(w=>selected.has(w.id)&&w.health<'2025-01-01').length;return `<div class="card">${context()}<div class="stepbar"><div class="step on"></div><div class="step on"></div><div class="step on"></div><div class="step"></div></div><div class="cap">1 現場選択 → 2 作業員選択 → 3 可変項目確認 → 4 PDF送信</div></div><div class="card"><div class="row between"><div class="title">提出する作業員</div><span class="pill">${db.selected.length}名</span></div>${db.workers.map(w=>`<label class="item row between"><span class="row"><input type="checkbox" style="width:24px;height:24px" ${selected.has(w.id)?'checked':''} onchange="toggleWorker('${w.id}',this.checked)"><span><b>${w.name}</b><br><span class="cap">${w.company} / ${w.trade}</span></span></span><span class="pill ${w.health<'2025-01-01'?'warn':'ok'}">健診</span></label>`).join('')}</div><div class="card"><div class="row between"><div class="title">提出前チェック</div><span class="pill ${warn?'warn':'ok'}">${warn?'確認あり':'OK'}</span></div><div class="item row between"><span>元請指定様式</span><span class="pill warn">要フォーマット確認</span></div><div class="item row between"><span>健康診断日</span><span class="pill ${warn?'warn':'ok'}">${warn?'期限確認':'OK'}</span></div><div class="item row between"><span>入場日・教育日</span><span class="pill blue">現場ごと</span></div><button class="btn primary" style="width:100%" onclick="toast('PDF送信は次段階で実装します')">PDFプレビューへ</button></div>`}
function toggleWorker(id,on){let s=new Set(db.selected);on?s.add(id):s.delete(id);db.selected=[...s];save();render()}
function summary(){setTitle('出面表','月末にまとめて確認・出力');let s=sums();let rows='';for(let d=1;d<=dim();d++){let r=reports().find(x=>x.day===d)||{};let l=+r.labor||0;rows+=`<tr><td>${d}</td><td>${l||''}</td><td>${l?l*8:''}</td><td>${r.overtime||''}</td><td></td></tr>`}rows+=`<tr class="total"><td>集計</td><td>${s.labor}</td><td>${s.work}</td><td>${s.ot}</td><td></td></tr>`;return `<div class="card">${context()}</div><div class="grid3"><div class="stat"><strong>${s.labor}</strong><span>人工</span></div><div class="stat"><strong>${s.work}</strong><span>勤務H</span></div><div class="stat"><strong>${s.ot}</strong><span>残業H</span></div></div><div class="card"><div class="title">提出前チェック</div><div class="item row between"><span>日報未入力</span><span class="pill ${missing()?'warn':'ok'}">${missing()}日</span></div><div class="item row between"><span>勤務時間</span><span class="pill ok">人工 × 8H</span></div><div class="item row between"><span>清算金額</span><span class="pill warn">後回し</span></div></div><div class="card"><div class="row between"><div class="title">出面表プレビュー</div><button class="btn sm" onclick="window.print()">PDF</button></div><div class="sheetbox"><table class="sheet"><thead><tr><th>月日</th><th>人工数</th><th>勤務時間</th><th>残業</th><th>深夜残業</th></tr></thead><tbody>${rows}</tbody></table></div></div>`}
function workers(){setTitle('作業員管理','新規追加・修正しやすく');return `<div class="card"><div class="search"><input class="input" placeholder="氏名・会社で検索"><button class="btn primary" onclick="openWorker()">追加</button></div></div>${db.workers.map(w=>`<div class="item" onclick="openWorker('${w.id}')"><div class="row between"><div><b>${w.name}</b><div class="cap">${w.kana}</div></div><span class="pill ${w.health<'2025-01-01'?'warn':'ok'}">健診 ${w.health||'未入力'}</span></div><div class="cap" style="margin-top:5px">${w.company} / ${w.trade} / ${w.ins}</div><div class="small">${w.license||'資格・教育 未入力'}</div></div>`).join('')}`}
function openWorker(id){let w=db.workers.find(x=>x.id===id)||{id:null,name:'',kana:'',company:'自社',trade:'電気工',health:'',ins:'協会けんぽ',license:'',phone:''};editWorker=id||null;$('panel').innerHTML=`<div class="title">作業員情報</div><div class="grid2"><div class="field"><label>氏名</label><input id="w_name" class="input" value="${w.name}"></div><div class="field"><label>フリガナ</label><input id="w_kana" class="input" value="${w.kana}"></div></div><div class="grid2"><div class="field"><label>所属</label><select id="w_company">${db.masters.company.map(x=>`<option ${x===w.company?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>職種</label><select id="w_trade">${db.masters.trade.map(x=>`<option ${x===w.trade?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="grid2"><div class="field"><label>健康診断日</label><input id="w_health" class="input" type="date" value="${w.health}"></div><div class="field"><label>保険</label><select id="w_ins">${db.masters.ins.map(x=>`<option ${x===w.ins?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="field"><label>電話</label><input id="w_phone" class="input" value="${w.phone||''}"></div><div class="field"><label>資格・教育</label><textarea id="w_license">${w.license||''}</textarea></div><div class="fixedAction"><button class="btn primary" style="width:100%" onclick="saveWorker()">保存する</button></div>`;$('drawer').classList.add('on')}
function saveWorker(){let data={id:editWorker||'w'+Date.now(),name:val('w_name'),kana:val('w_kana'),company:val('w_company'),trade:val('w_trade'),health:val('w_health'),ins:val('w_ins'),phone:val('w_phone'),license:val('w_license')};if(editWorker){Object.assign(db.workers.find(w=>w.id===editWorker),data)}else db.workers.push(data);save();closePanel();toast('保存しました');render()}
function render(){nav();const routes={home,report,roster,summary,workers};$('app').innerHTML=routes[db.tab]()}render();
</script>
</body>
</html>
