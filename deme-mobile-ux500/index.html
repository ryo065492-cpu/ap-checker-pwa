<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>現場日報・出面管理 UX500</title>
<style>
:root{
  --bg:#f1f4f7;--card:#ffffff;--ink:#101828;--sub:#667085;--line:#d0d5dd;
  --main:#14532d;--main2:#166534;--soft:#ecfdf3;--soft2:#f6fef9;
  --warn:#b54708;--warnbg:#fffaeb;--bad:#b42318;--badbg:#fef3f2;--blue:#175cd3;--bluebg:#eff8ff;
  --r:18px;--shadow:0 10px 24px rgba(16,24,40,.08)
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#d8dde5;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;font-size:15px;line-height:1.45}button,input,select,textarea{font:inherit}button{cursor:pointer}b{font-weight:850}.phone{min-height:100dvh;background:var(--bg);padding-bottom:calc(76px + env(safe-area-inset-bottom))}.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 10px) 14px 10px}.topRow{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:10px}.logo{width:34px;height:34px;border-radius:11px;background:var(--main);color:#fff;display:grid;place-items:center;font-weight:950}.top h1{font-size:18px;margin:0}.top p{font-size:12px;color:var(--sub);margin:1px 0 0}.switchBtn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:850;color:#344054}.wrap{max-width:520px;margin:0 auto;padding:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.flat{box-shadow:none}.title{font-size:17px;font-weight:950;margin:0 0 9px}.sub{font-size:12px;color:var(--sub)}.small{font-size:12px}.row{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.field{display:grid;gap:5px}.field label{font-size:12px;color:#344054;font-weight:850}.input,select,textarea{width:100%;min-height:48px;border:1px solid #cbd5e1;border-radius:13px;background:#fff;color:var(--ink);padding:11px;outline:none}textarea{min-height:94px;resize:vertical}.btn{border:1px solid var(--line);border-radius:14px;min-height:48px;background:#fff;color:#1f2937;padding:10px 13px;font-weight:900}.btn.primary{background:var(--main);border-color:var(--main);color:#fff}.btn.dark{background:#111827;border-color:#111827;color:#fff}.btn.ghost{background:#f9fafb}.btn.danger{color:var(--bad);border-color:#f5c2bc}.btn.sm{min-height:36px;border-radius:11px;padding:7px 10px;font-size:12px}.hero{background:linear-gradient(135deg,#14532d,#166534);color:#fff;border:0}.hero .sub{color:#d1fadf}.pill{display:inline-flex;align-items:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:850;color:#344054;white-space:nowrap}.ok{background:var(--soft);border-color:#bbf7d0;color:#166534}.warn{background:var(--warnbg);border-color:#fedf89;color:var(--warn)}.bad{background:var(--badbg);border-color:#fecdca;color:var(--bad)}.blue{background:var(--bluebg);border-color:#b2ddff;color:var(--blue)}.task{display:grid;grid-template-columns:44px 1fr 24px;gap:12px;align-items:center;border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px;margin-bottom:10px}.task:active,.item:active{background:#f8fafc}.num{width:44px;height:44px;border-radius:14px;background:var(--soft);color:var(--main2);display:grid;place-items:center;font-size:18px;font-weight:950}.task b{display:block;font-size:16px}.chev{font-size:25px;color:#98a2b3}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}.stat strong{display:block;font-size:23px;line-height:1}.stat span{font-size:11px;color:var(--sub)}.notice{border:1px solid #bbf7d0;border-left:5px solid var(--main);background:var(--soft2);border-radius:14px;padding:12px;margin-bottom:12px}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:2px}.chip{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:850}.chip.on{background:#111827;color:#fff;border-color:#111827}.chip.warn{background:var(--warnbg);color:var(--warn)}.item{border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px;margin-bottom:9px}.day{display:grid;grid-template-columns:46px 1fr auto;gap:10px;align-items:center}.dayBox{width:46px;height:46px;border-radius:15px;background:#f2f4f7;display:grid;place-items:center;font-weight:950}.day.done .dayBox{background:var(--soft);color:var(--main2)}.stepbar{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:8px 0 12px}.step{height:5px;border-radius:999px;background:#e4e7ec}.step.on{background:var(--main)}.stepText{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;font-size:10px;color:var(--sub);text-align:center}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.calBtn{min-height:42px;border:1px solid var(--line);background:#fff;border-radius:12px;font-weight:900}.calBtn.done{background:var(--soft);border-color:#bbf7d0;color:var(--main2)}.calBtn.today{outline:2px solid #111827}.check{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:center}.check input{width:24px;height:24px}.sheetBox{overflow:auto;border:1px solid #98a2b3;border-radius:12px;background:#fff}.sheet{border-collapse:collapse;min-width:720px;width:100%;font-size:12px}.sheet th,.sheet td{border:1px solid #98a2b3;padding:5px;text-align:left}.sheet th{background:#eef2f6}.sheet .total td{background:#fff3bf;font-weight:900}.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:#fff;border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -8px 22px rgba(16,24,40,.08)}.nav button{border:0;background:#fff;border-radius:13px;min-height:54px;color:#667085;font-size:11px;font-weight:900}.nav button span{display:block;font-size:18px;line-height:1.05;margin-bottom:3px}.nav button.on{background:var(--soft);color:var(--main2)}.drawer{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:50;display:none;align-items:flex-end}.drawer.on{display:flex}.panel{width:100%;max-height:92dvh;overflow:auto;background:#fff;border-radius:24px 24px 0 0;padding:12px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -10px 35px rgba(15,23,42,.22)}.handle{width:46px;height:5px;border-radius:999px;background:#d0d5dd;margin:0 auto 12px}.toast{position:fixed;left:12px;right:12px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:60;background:#111827;color:#fff;border-radius:14px;padding:12px 14px;display:none}.toast.on{display:block}.stickyAction{position:sticky;bottom:0;background:#fff;padding-top:10px;margin-top:10px}.empty{text-align:center;color:var(--sub);border:1px dashed #cbd5e1;border-radius:16px;background:#fff;padding:18px}.seg{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:14px;overflow:hidden}.seg button{border:0;background:#fff;min-height:42px;font-weight:900;color:#475467}.seg button.on{background:#111827;color:#fff}.footerNote{font-size:11px;color:var(--sub);text-align:center;margin:12px 0}.safeArea{height:10px}@media(min-width:720px){.phone{width:390px;min-height:820px;margin:18px auto;border:8px solid #111827;border-radius:34px;overflow:hidden;position:relative}.nav{left:50%;right:auto;transform:translateX(-50%);width:390px;border-radius:0 0 25px 25px}.toast{left:calc(50% - 183px);right:calc(50% - 183px)}}@media print{body{background:#fff}.phone{width:auto!important;border:0!important;margin:0!important;padding:0}.top,.nav,.drawer,.toast,.btn,.tabs,.calendar,.notice{display:none!important}.wrap{max-width:none;padding:0}.card{box-shadow:none;border:0}.sheet{min-width:0;font-size:10px}}
</style>
</head>
<body>
<div class="phone">
<header class="top"><div class="topRow"><div class="brand"><div class="logo">現</div><div><h1 id="ttl">ホーム</h1><p id="sub">現場で迷わないスマホUI</p></div></div><button class="switchBtn" onclick="openContext()">現場/月</button></div></header>
<main class="wrap" id="app"></main>
<nav class="nav" id="nav"></nav>
<div class="drawer" id="drawer" onclick="if(event.target.id==='drawer')closePanel()"><div class="panel"><div class="handle"></div><div id="panel"></div></div></div>
<div class="toast" id="toast"></div>
</div>
<script>
const KEY='deme-ux500-v1';
const seed={tab:'home',job:'j1',month:'2026-06',mode:'easy',rosterStep:1,selected:['w1','w2'],jobs:[{id:'j1',name:'青葉マンション改修工事',client:'青葉建設',manager:'高橋所長',status:'稼働中'},{id:'j2',name:'南町ビル設備更新',client:'南町開発',manager:'田中所長',status:'稼働中'},{id:'j3',name:'北口店舗原状回復',client:'北口不動産',manager:'佐々木所長',status:'準備中'}],workers:[{id:'w1',name:'山田 太郎',kana:'ヤマダ タロウ',company:'自社',trade:'電気工',health:'2025-09-10',ins:'協会けんぽ',license:'職長教育・高所作業車',phone:'090-0000-0001',entry:'2026-06-01',sendEdu:'2026-05-28',acceptEdu:'2026-06-01'},{id:'w2',name:'佐藤 一郎',kana:'サトウ イチロウ',company:'協力会社A',trade:'設備工',health:'2025-07-03',ins:'協会けんぽ',license:'玉掛け',phone:'090-0000-0002',entry:'2026-06-01',sendEdu:'2026-05-29',acceptEdu:'2026-06-01'},{id:'w3',name:'鈴木 健',kana:'スズキ ケン',company:'協力会社B',trade:'内装工',health:'2024-11-20',ins:'国保',license:'足場特別教育',phone:'090-0000-0003',entry:'',sendEdu:'',acceptEdu:''}],reports:[{day:1,job:'j1',content:'共用部配線・既設確認',labor:2,overtime:1,car:1,distance:18,note:'2名対応'},{day:2,job:'j1',content:'器具取付',labor:1.5,overtime:0,car:1,distance:18,note:''},{day:4,job:'j1',content:'盤まわり確認',labor:1,overtime:.5,car:0,distance:0,note:'午後から'}],masters:{labor:[0.5,1,1.5,2,2.5,3],ot:[0,0.5,1,1.5,2,3],company:['自社','協力会社A','協力会社B'],trade:['電気工','設備工','内装工','大工'],ins:['協会けんぽ','国保','未加入']}};
let db=JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(seed);let editDay=null,editWorker=null;const $=id=>document.getElementById(id);const save=()=>localStorage.setItem(KEY,JSON.stringify(db));
function job(){return db.jobs.find(j=>j.id===db.job)||db.jobs[0]}function reports(){return db.reports.filter(r=>r.job===db.job).sort((a,b)=>a.day-b.day)}function dim(){let [y,m]=db.month.split('-').map(Number);return new Date(y,m,0).getDate()}function sums(){return reports().reduce((a,r)=>{a.labor+=+r.labor||0;a.ot+=+r.overtime||0;a.car+=+r.car||0;a.dist+=+r.distance||0;return a},{labor:0,ot:0,car:0,dist:0,get work(){return this.labor*8}})}function doneDays(){return new Set(reports().map(r=>r.day))}function missing(){let s=doneDays(),n=0;for(let i=1;i<=dim();i++)if(!s.has(i))n++;return n}function selectedWorkers(){return db.workers.filter(w=>db.selected.includes(w.id))}function rosterWarn(){return selectedWorkers().filter(w=>w.health<'2025-01-01'||!w.entry||!w.sendEdu||!w.acceptEdu).length}
function toast(t){$('toast').textContent=t;$('toast').classList.add('on');setTimeout(()=>$('toast').classList.remove('on'),1500)}function closePanel(){$('drawer').classList.remove('on')}function setTitle(t,s){$('ttl').textContent=t;$('sub').textContent=s||''}
function nav(){const a=[['home','ホーム','⌂'],['report','日報','✎'],['roster','名簿','人'],['summary','出面','表'],['workers','作業員','名']];$('nav').innerHTML=a.map(x=>`<button class="${db.tab===x[0]?'on':''}" onclick="go('${x[0]}')"><span>${x[2]}</span>${x[1]}</button>`).join('')}function go(t){db.tab=t;save();render()}
function openContext(){const j=job();$('panel').innerHTML=`<div class="title">現場・月を変更</div><div class="field"><label>現場</label><select id="ctx_job">${db.jobs.map(x=>`<option value="${x.id}" ${x.id===db.job?'selected':''}>${x.name}</option>`).join('')}</select></div><div class="field"><label>対象月</label><input id="ctx_month" class="input" type="month" value="${db.month}"></div><div class="notice"><b>現在</b><br><span class="sub">${j.client} / ${j.manager}</span></div><button class="btn primary" style="width:100%" onclick="db.job=$('ctx_job').value;db.month=$('ctx_month').value;save();closePanel();render();toast('現場・月を変更しました')">変更する</button>`;$('drawer').classList.add('on')}
function home(){setTitle('ホーム','やることを3つに固定');let s=sums();return `<div class="card hero"><div class="title">今日やる作業を選ぶ</div><div class="sub">説明を読まなくても、下の3つから始められる設計です。</div></div><div class="task" onclick="go('report')"><div class="num">1</div><div><b>紙の日報を入力</b><div class="sub">日付・作業内容・人工・残業</div></div><div class="chev">›</div></div><div class="task" onclick="go('roster')"><div class="num">2</div><div><b>元請へ名簿を出す</b><div class="sub">作業員選択・可変項目確認</div></div><div class="chev">›</div></div><div class="task" onclick="go('summary')"><div class="num">3</div><div><b>月末の出面表を見る</b><div class="sub">日報データから自動集計</div></div><div class="chev">›</div></div><div class="card"><div class="row between"><div><div class="title" style="margin:0">${job().name}</div><div class="sub">${job().client} / ${db.month}</div></div><span class="pill ok">${job().status}</span></div></div><div class="grid3"><div class="stat"><strong>${reports().length}</strong><span>入力済日</span></div><div class="stat"><strong>${s.labor}</strong><span>人工</span></div><div class="stat"><strong>${missing()}</strong><span>未入力日</span></div></div><div class="footerNote">UX500：仮想モニター500件の指摘を想定して調整</div>`}
function report(){setTitle('日報入力','紙と同じ順番で1日ずつ');let rs=reports(), dset=doneDays();return `<div class="card"><div class="row between"><div><div class="title" style="margin:0">${job().name}</div><div class="sub">${db.month}</div></div><button class="btn sm" onclick="openContext()">変更</button></div></div><div class="card"><div class="row between"><div class="title">入力モード</div><div class="seg"><button class="${db.mode==='easy'?'on':''}" onclick="db.mode='easy';save();render()">かんたん</button><button class="${db.mode==='pro'?'on':''}" onclick="db.mode='pro';save();render()">詳細</button></div></div><div class="notice"><b>入力順</b><br><span class="sub">日付 → 作業内容 → 人工 → 残業 → 保存。車両・距離は詳細モードで入力します。</span></div><button class="btn primary" style="width:100%" onclick="openReport()">＋ 1日分を入力する</button></div><div class="card"><div class="row between"><div class="title">日付を選ぶ</div><span class="pill ${missing()? 'warn':'ok'}">未入力 ${missing()}日</span></div><div class="calendar">${Array.from({length:dim()},(_,i)=>i+1).map(d=>`<button class="calBtn ${dset.has(d)?'done':''}" onclick="openReport(${d})">${d}</button>`).join('')}</div></div><div class="card"><div class="title">入力済み</div>${rs.map(r=>`<div class="item day done" onclick="openReport(${r.day})"><div class="dayBox">${r.day}</div><div><b>${r.content||'作業内容未入力'}</b><div class="sub">人工 ${r.labor} / 残業 ${r.overtime||0}H${db.mode==='pro'?` / 車両 ${r.car||0} / ${r.distance||0}km`:''}</div></div><span class="pill ok">済</span></div>`).join('')||'<div class="empty">まだ日報がありません。</div>'}</div>`}
function openReport(day){let r=db.reports.find(x=>x.job===db.job&&x.day===day)||{day:day||1,job:db.job,content:'',labor:1,overtime:0,car:0,distance:0,note:''};editDay=day||null;let pro=db.mode==='pro';$('panel').innerHTML=`<div class="row between"><div><div class="title">1日分の日報</div><div class="sub">${job().name}</div></div><span class="pill blue">${db.month}</span></div><div class="field"><label>日付</label><input id="r_day" class="input" type="number" min="1" max="31" value="${r.day}"></div><div class="field"><label>作業内容</label><textarea id="r_content" placeholder="例：共用部配線、器具取付">${r.content||''}</textarea></div><div class="field"><label>人工</label><div class="tabs">${db.masters.labor.map(v=>`<button class="chip ${+r.labor===v?'on':''}" onclick="setv('r_labor','${v}',this)">${v}</button>`).join('')}</div><input id="r_labor" type="hidden" value="${r.labor}"></div><div class="field"><label>残業H</label><div class="tabs">${db.masters.ot.map(v=>`<button class="chip ${+r.overtime===v?'on':''}" onclick="setv('r_ot','${v}',this)">${v}</button>`).join('')}</div><input id="r_ot" type="hidden" value="${r.overtime||0}"></div>${pro?`<div class="grid2"><div class="field"><label>車両</label><input id="r_car" class="input" type="number" value="${r.car||0}"></div><div class="field"><label>距離数 km</label><input id="r_dist" class="input" type="number" value="${r.distance||0}"></div></div>`:`<input id="r_car" type="hidden" value="${r.car||0}"><input id="r_dist" type="hidden" value="${r.distance||0}">`}<div class="field"><label>備考</label><input id="r_note" class="input" value="${r.note||''}"></div><div class="stickyAction"><button class="btn primary" style="width:100%" onclick="saveReport()">保存する</button>${editDay?`<button class="btn" style="width:100%;margin-top:8px" onclick="copyNext(${editDay})">この内容を翌日にコピー</button><button class="btn danger" style="width:100%;margin-top:8px" onclick="deleteReport(${editDay})">削除</button>`:''}</div>`;$('drawer').classList.add('on')}
function setv(id,v,btn){$(id).value=v;btn.parentElement.querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));btn.classList.add('on')}function val(id){return $(id).value}function saveReport(){let d=+val('r_day');if(!d||d<1||d>31){toast('日付を確認してください');return}db.reports=db.reports.filter(r=>!(r.job===db.job&&r.day===editDay));db.reports.push({day:d,job:db.job,content:val('r_content'),labor:+val('r_labor'),overtime:+val('r_ot'),car:+val('r_car'),distance:+val('r_dist'),note:val('r_note')});save();closePanel();toast('日報を保存しました');render()}function copyNext(day){let r=db.reports.find(x=>x.job===db.job&&x.day===day);if(!r||day>=dim())return;db.reports=db.reports.filter(x=>!(x.job===db.job&&x.day===day+1));db.reports.push({...r,day:day+1});save();closePanel();toast('翌日にコピーしました');render()}function deleteReport(day){if(!confirm('この日報を削除しますか？'))return;db.reports=db.reports.filter(r=>!(r.job===db.job&&r.day===day));save();closePanel();toast('削除しました');render()}
function roster(){setTitle('作業員名簿','4ステップで提出前確認');let step=db.rosterStep;return `<div class="card"><div class="stepbar">${[1,2,3,4].map(n=>`<div class="step ${step>=n?'on':''}"></div>`).join('')}</div><div class="stepText"><span>現場</span><span>選択</span><span>確認</span><span>送信</span></div></div>${step===1?roster1():step===2?roster2():step===3?roster3():roster4()}`}
function rosterBtns(back,next){return `<div class="grid2"><button class="btn" onclick="db.rosterStep=${back};save();render()">戻る</button><button class="btn primary" onclick="db.rosterStep=${next};save();render()">次へ</button></div>`}
function roster1(){return `<div class="card"><div class="title">1. 現場と様式を確認</div><div class="item"><b>${job().name}</b><div class="sub">元請：${job().client}</div></div><div class="item row between"><span>提出様式</span><span class="pill warn">元請指定</span></div><button class="btn primary" style="width:100%" onclick="db.rosterStep=2;save();render()">作業員を選ぶ</button></div>`}
function roster2(){let s=new Set(db.selected);return `<div class="card"><div class="row between"><div class="title">2. 作業員を選ぶ</div><span class="pill">${db.selected.length}名</span></div>${db.workers.map(w=>`<label class="item check"><input type="checkbox" ${s.has(w.id)?'checked':''} onchange="toggleWorker('${w.id}',this.checked)"><span><b>${w.name}</b><br><span class="sub">${w.company} / ${w.trade}</span></span><span class="pill ${w.health<'2025-01-01'?'warn':'ok'}">健診</span></label>`).join('')}${rosterBtns(1,3)}</div>`}
function roster3(){return `<div class="card"><div class="row between"><div class="title">3. 可変項目を確認</div><span class="pill ${rosterWarn()?'warn':'ok'}">${rosterWarn()? '確認あり':'OK'}</span></div>${selectedWorkers().map(w=>`<div class="item"><b>${w.name}</b><div class="grid2" style="margin-top:8px"><div class="field"><label>入場日</label><input class="input" type="date" value="${w.entry||''}" onchange="setWorker('${w.id}','entry',this.value)"></div><div class="field"><label>受入教育日</label><input class="input" type="date" value="${w.acceptEdu||''}" onchange="setWorker('${w.id}','acceptEdu',this.value)"></div></div><div class="field" style="margin-top:8px"><label>送り出し教育日</label><input class="input" type="date" value="${w.sendEdu||''}" onchange="setWorker('${w.id}','sendEdu',this.value)"></div></div>`).join('')}${rosterBtns(2,4)}</div>`}
function roster4(){let warn=rosterWarn();return `<div class="card"><div class="title">4. 提出前チェック</div><div class="item row between"><span>対象者</span><span class="pill">${db.selected.length}名</span></div><div class="item row between"><span>健康診断日・教育日</span><span class="pill ${warn?'warn':'ok'}">${warn?'確認あり':'OK'}</span></div><div class="item row between"><span>PDF様式</span><span class="pill warn">実物合わせ待ち</span></div><button class="btn primary" style="width:100%" onclick="toast('PDF出力は次フェーズで実装します')">PDFプレビュー</button><button class="btn" style="width:100%;margin-top:8px" onclick="db.rosterStep=3;save();render()">戻って修正</button></div>`}
function toggleWorker(id,on){let s=new Set(db.selected);on?s.add(id):s.delete(id);db.selected=[...s];save();render()}function setWorker(id,k,v){let w=db.workers.find(x=>x.id===id);if(w){w[k]=v;save()}}
function summary(){setTitle('出面表','月末に確認して出力');let s=sums();let rows='';for(let d=1;d<=dim();d++){let r=reports().find(x=>x.day===d)||{};let l=+r.labor||0;rows+=`<tr><td>${d}</td><td>${l||''}</td><td>${l?l*8:''}</td><td>${r.overtime||''}</td><td></td></tr>`}rows+=`<tr class="total"><td>集計</td><td>${s.labor}</td><td>${s.work}</td><td>${s.ot}</td><td></td></tr>`;return `<div class="card"><div class="row between"><div><div class="title" style="margin:0">${job().name}</div><div class="sub">${db.month}</div></div><button class="btn sm" onclick="openContext()">変更</button></div></div><div class="grid3"><div class="stat"><strong>${s.labor}</strong><span>人工</span></div><div class="stat"><strong>${s.work}</strong><span>勤務H</span></div><div class="stat"><strong>${s.ot}</strong><span>残業H</span></div></div><div class="card"><div class="title">提出前チェック</div><div class="item row between"><span>日報未入力</span><span class="pill ${missing()?'warn':'ok'}">${missing()}日</span></div><div class="item row between"><span>勤務時間</span><span class="pill ok">人工 × 8H</span></div><div class="item row between"><span>清算金額</span><span class="pill warn">後回し</span></div><button class="btn" style="width:100%" onclick="go('report')">未入力を確認する</button></div><div class="card"><div class="row between"><div class="title">出面表プレビュー</div><button class="btn sm" onclick="window.print()">PDF</button></div><div class="sheetBox"><table class="sheet"><thead><tr><th>月日</th><th>人工数</th><th>勤務時間</th><th>残業</th><th>深夜残業</th></tr></thead><tbody>${rows}</tbody></table></div></div>`}
function workers(){setTitle('作業員管理','修正漏れを減らす');return `<div class="card"><div class="row between"><div><div class="title" style="margin:0">作業員一覧</div><div class="sub">健康診断日・保険・資格を管理</div></div><button class="btn sm primary" onclick="openWorker()">追加</button></div><div class="tabs" style="margin-top:10px"><button class="chip on">全員</button><button class="chip warn">更新注意</button><button class="chip">自社</button><button class="chip">協力会社</button></div></div>${db.workers.map(w=>`<div class="item" onclick="openWorker('${w.id}')"><div class="row between"><div><b>${w.name}</b><div class="sub">${w.kana}</div></div><span class="pill ${w.health<'2025-01-01'?'warn':'ok'}">健診 ${w.health||'未入力'}</span></div><div class="sub" style="margin-top:5px">${w.company} / ${w.trade} / ${w.ins}</div><div class="small">${w.license||'資格・教育 未入力'}</div></div>`).join('')}`}
function openWorker(id){let w=db.workers.find(x=>x.id===id)||{id:null,name:'',kana:'',company:'自社',trade:'電気工',health:'',ins:'協会けんぽ',license:'',phone:'',entry:'',sendEdu:'',acceptEdu:''};editWorker=id||null;$('panel').innerHTML=`<div class="title">作業員情報</div><div class="grid2"><div class="field"><label>氏名</label><input id="w_name" class="input" value="${w.name}"></div><div class="field"><label>フリガナ</label><input id="w_kana" class="input" value="${w.kana}"></div></div><div class="grid2"><div class="field"><label>所属</label><select id="w_company">${db.masters.company.map(x=>`<option ${x===w.company?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>職種</label><select id="w_trade">${db.masters.trade.map(x=>`<option ${x===w.trade?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="grid2"><div class="field"><label>健康診断日</label><input id="w_health" class="input" type="date" value="${w.health}"></div><div class="field"><label>保険</label><select id="w_ins">${db.masters.ins.map(x=>`<option ${x===w.ins?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="field"><label>電話</label><input id="w_phone" class="input" value="${w.phone||''}"></div><div class="field"><label>資格・教育</label><textarea id="w_license">${w.license||''}</textarea></div><div class="stickyAction"><button class="btn primary" style="width:100%" onclick="saveWorker()">保存する</button>${editWorker?`<button class="btn danger" style="width:100%;margin-top:8px" onclick="deleteWorker('${editWorker}')">削除</button>`:''}</div>`;$('drawer').classList.add('on')}
function saveWorker(){let data={id:editWorker||'w'+Date.now(),name:val('w_name'),kana:val('w_kana'),company:val('w_company'),trade:val('w_trade'),health:val('w_health'),ins:val('w_ins'),phone:val('w_phone'),license:val('w_license'),entry:'',sendEdu:'',acceptEdu:''};if(editWorker){Object.assign(db.workers.find(w=>w.id===editWorker),data)}else db.workers.push(data);save();closePanel();toast('保存しました');render()}function deleteWorker(id){if(!confirm('この作業員を削除しますか？'))return;db.workers=db.workers.filter(w=>w.id!==id);db.selected=db.selected.filter(x=>x!==id);save();closePanel();toast('削除しました');render()}
function render(){nav();const routes={home,report,roster,summary,workers};$('app').innerHTML=routes[db.tab]()}render();
</script>
</body>
</html>
