<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>日報入力 v3</title>
<style>
:root{--bg:#f2f4f7;--card:#fff;--ink:#101828;--sub:#667085;--line:#d0d5dd;--main:#14532d;--main2:#166534;--soft:#ecfdf3;--warn:#b54708;--warnbg:#fffaeb;--bad:#b42318;--badbg:#fef3f2;--blue:#175cd3;--bluebg:#eff8ff;--r:18px;--shadow:0 8px 22px rgba(16,24,40,.08)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#d8dde4;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;font-size:15px;line-height:1.45}button,input,select,textarea{font:inherit}button{cursor:pointer}.phone{min-height:100dvh;background:var(--bg);padding-bottom:calc(82px + env(safe-area-inset-bottom))}.top{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 10px) 14px 10px}.topRow{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:9px}.mark{width:32px;height:32px;border-radius:10px;background:var(--main);color:#fff;display:grid;place-items:center;font-weight:900}.top h1{margin:0;font-size:18px}.top p{margin:1px 0 0;font-size:12px;color:var(--sub)}.wrap{max-width:520px;margin:0 auto;padding:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.title{font-size:16px;font-weight:900;margin:0 0 8px}.sub{font-size:12px;color:var(--sub)}.row{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn{border:1px solid var(--line);background:#fff;color:#1f2937;border-radius:13px;min-height:46px;padding:10px 12px;font-weight:850}.btn.primary{background:var(--main);border-color:var(--main);color:#fff}.btn.dark{background:#111827;border-color:#111827;color:#fff}.btn.sm{min-height:34px;border-radius:10px;padding:6px 9px;font-size:12px}.btn.danger{color:var(--bad);border-color:#fecdca;background:#fff}.pill{display:inline-flex;align-items:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:850;color:#344054;white-space:nowrap}.ok{background:var(--soft);border-color:#bbf7d0;color:var(--main2)}.warn{background:var(--warnbg);border-color:#fedf89;color:var(--warn)}.bad{background:var(--badbg);border-color:#fecdca;color:var(--bad)}.blue{background:var(--bluebg);border-color:#b2ddff;color:var(--blue)}.context{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:12px}.dateBar{display:grid;grid-template-columns:44px 1fr 44px;gap:8px;align-items:center;margin-top:10px}.dateBox{border:1px solid var(--line);border-radius:14px;background:#fff;min-height:48px;padding:8px 10px;text-align:center}.dateBox strong{display:block;font-size:17px}.dateBox span{font-size:11px;color:var(--sub)}.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px}.stat strong{display:block;font-size:21px;line-height:1}.stat span{font-size:11px;color:var(--sub)}.fieldCard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:9px}.fieldCard:active{background:#f8fafc}.fieldHead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.fieldName{font-weight:900}.fieldValue{margin-top:5px;color:#1f2937;white-space:pre-wrap}.placeholder{color:#98a2b3}.chev{font-size:22px;color:#98a2b3}.calc{border:1px solid #bbf7d0;background:#f6fef9;border-radius:14px;padding:11px;margin-bottom:12px}.chips{display:flex;gap:8px;overflow:auto;padding:2px 0 4px}.chip{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-size:15px;font-weight:900}.chip.on{background:#111827;color:#fff;border-color:#111827}.input,select,textarea{width:100%;min-height:48px;border:1px solid #cbd5e1;border-radius:13px;background:#fff;color:var(--ink);padding:11px;outline:none}textarea{min-height:120px;resize:vertical}.field{display:grid;gap:5px;margin-bottom:10px}.field label{font-size:12px;color:#344054;font-weight:850}.bottomSave{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);padding:8px 12px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -8px 22px rgba(16,24,40,.08)}.bottomInner{max-width:520px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}.mainSave{grid-column:1/3}.drawer{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:50;display:none;align-items:flex-end}.drawer.on{display:flex}.panel{width:100%;max-height:90dvh;overflow:auto;background:#fff;border-radius:22px 22px 0 0;padding:14px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -10px 30px rgba(15,23,42,.2)}.handle{width:46px;height:5px;border-radius:99px;background:#d0d5dd;margin:0 auto 12px}.toast{position:fixed;left:12px;right:12px;bottom:calc(96px + env(safe-area-inset-bottom));z-index:60;background:#111827;color:#fff;border-radius:12px;padding:12px 14px;display:none}.toast.on{display:block}.sheetBox{overflow:auto;border:1px solid var(--line);border-radius:14px;background:#fff}.listRow{display:grid;grid-template-columns:42px 1fr 62px 54px;gap:8px;align-items:center;min-height:48px;padding:8px 10px;border-bottom:1px solid #eaecf0}.listRow:last-child{border-bottom:0}.listRow.head{background:#f8fafc;font-size:12px;color:#475467;font-weight:850;min-height:38px}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tabs{display:flex;gap:8px;margin-bottom:10px}.tabs button{flex:1}.empty{text-align:center;color:var(--sub);border:1px dashed #cbd5e1;border-radius:14px;background:#fff;padding:18px}@media(min-width:720px){.phone{width:390px;min-height:820px;margin:18px auto;border:8px solid #111827;border-radius:34px;overflow:hidden;position:relative}.bottomSave{left:50%;right:auto;transform:translateX(-50%);width:390px;border-radius:0 0 25px 25px}.toast{left:calc(50% - 183px);right:calc(50% - 183px)}}
</style>
</head>
<body>
<div class="phone">
<header class="top"><div class="topRow"><div class="brand"><div class="mark">日</div><div><h1>日報入力</h1><p>今日の分を入力・修正</p></div></div><button class="btn sm" onclick="openContext()">現場</button></div></header>
<main class="wrap" id="app"></main>
<div class="bottomSave"><div class="bottomInner"><button class="btn mainSave primary" onclick="saveReport()" id="saveBtn">保存する</button><button class="btn" onclick="copyPrev()">前日コピー</button><button class="btn" onclick="openList()">一覧</button></div></div>
<div class="drawer" id="drawer" onclick="if(event.target.id==='drawer')closePanel()"><div class="panel"><div class="handle"></div><div id="panel"></div></div></div>
<div class="toast" id="toast"></div>
</div>
<script>
const KEY='deme-report-input-v3';
const now=new Date();
const todayMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
const seed={job:'j1',month:'2026-06',day:now.getDate(),dirty:false,jobs:[{id:'j1',name:'青葉マンション改修工事',client:'青葉建設'},{id:'j2',name:'南町ビル設備更新',client:'南町開発'}],reports:[{day:1,job:'j1',content:'共用部配線・既設確認',labor:2,overtime:1,night:0,car:1,distance:18,note:'2名対応'},{day:2,job:'j1',content:'器具取付',labor:1.5,overtime:0,night:0,car:1,distance:18,note:''},{day:4,job:'j1',content:'盤まわり確認',labor:1,overtime:.5,night:0,car:0,distance:0,note:'午後から'}],draft:null,masters:{labor:[0.5,1,1.5,2,2.5,3],time:[0,0.5,1,1.5,2,3],car:[0,1,2,3]}};
let db=JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(seed);const $=id=>document.getElementById(id);const save=()=>localStorage.setItem(KEY,JSON.stringify(db));
function job(){return db.jobs.find(j=>j.id===db.job)||db.jobs[0]}function dim(){let [y,m]=db.month.split('-').map(Number);return new Date(y,m,0).getDate()}function list(){return db.reports.filter(r=>r.job===db.job).sort((a,b)=>a.day-b.day)}function rec(day=db.day){return db.reports.find(r=>r.job===db.job&&r.day===day)||null}function baseDraft(){return rec()?structuredClone(rec()):{day:db.day,job:db.job,content:'',labor:1,overtime:0,night:0,car:0,distance:0,note:''}}function draft(){if(!db.draft||db.draft.job!==db.job||db.draft.day!==db.day)db.draft=baseDraft();return db.draft}function sums(){return list().reduce((a,r)=>{a.labor+=+r.labor||0;a.ot+=+r.overtime||0;a.night+=+r.night||0;a.car+=+r.car||0;a.dist+=+r.distance||0;return a},{labor:0,ot:0,night:0,car:0,dist:0,get work(){return this.labor*8}})}function entered(){return new Set(list().map(r=>r.day))}function toast(t){$('toast').textContent=t;$('toast').classList.add('on');setTimeout(()=>$('toast').classList.remove('on'),1500)}function closePanel(){$('drawer').classList.remove('on')}function markDirty(){db.dirty=true;save();render(false)}function setDay(d){if(db.dirty&&!confirm('未保存の入力があります。日付を変更しますか？'))return;db.day=Math.max(1,Math.min(dim(),d));db.draft=null;db.dirty=false;save();render()}function dayLabel(){return `${db.month}-${String(db.day).padStart(2,'0')}`}
function render(full=true){let r=draft(), exist=!!rec();let s=sums();$('app').innerHTML=`<div class="context"><div class="row between"><div><div class="title" style="margin:0">${job().name}</div><div class="sub">${job().client} / ${db.month}</div></div><span class="pill ${exist?'ok':'warn'}">${exist?'保存済':'未保存'}</span></div><div class="dateBar"><button class="btn" onclick="setDay(db.day-1)">‹</button><button class="dateBox" onclick="openDate()"><strong>${db.day}日</strong><span>${db.month}</span></button><button class="btn" onclick="setDay(db.day+1)">›</button></div></div><div class="grid3"><div class="stat"><strong>${s.labor}</strong><span>月人工</span></div><div class="stat"><strong>${s.work}</strong><span>勤務H</span></div><div class="stat"><strong>${list().length}</strong><span>入力日</span></div></div><div class="calc"><div class="row between"><b>この日の勤務時間</b><span class="pill blue">${(+r.labor||0)*8}H</span></div><div class="sub">勤務時間は 人工 × 8時間 で計算</div></div>${field('作業内容',r.content,'未入力','content')}${field('人工',r.labor+' 人工','1.0人工','labor')}${field('残業',`${r.overtime||0} H`,'0H','overtime')}${field('深夜残業',`${r.night||0} H`,'0H','night')}${field('車両',`${r.car||0} 台`,'0台','car')}${field('距離数',`${r.distance||0} km`,'0km','distance')}${field('備考',r.note,'未入力','note')}`;$('saveBtn').textContent=db.dirty?'保存する':'保存済み';$('saveBtn').className='btn mainSave '+(db.dirty?'primary':'dark')}
function field(name,value,ph,key){let blank=value===undefined||value===null||value===''||value==='undefined 人工';return `<div class="fieldCard" onclick="openField('${key}')"><div class="fieldHead"><div><div class="fieldName">${name}</div><div class="fieldValue ${blank?'placeholder':''}">${blank?ph:value}</div></div><div class="chev">›</div></div></div>`}
function openField(key){let r=draft(), html='';if(key==='content'){html=`${pTitle('作業内容')}<textarea id="fv" class="input" style="min-height:170px" placeholder="例：共用部配線、器具取付">${r.content||''}</textarea>${saveFieldBtn(key)}`}
else if(key==='labor'){html=choicePanel('人工',key,r.labor,db.masters.labor,'人工')}
else if(key==='overtime'){html=choicePanel('残業H',key,r.overtime,db.masters.time,'H')}
else if(key==='night'){html=choicePanel('深夜残業H',key,r.night,db.masters.time,'H')}
else if(key==='car'){html=choicePanel('車両',key,r.car,db.masters.car,'台')}
else if(key==='distance'){html=`${pTitle('距離数')}<div class="field"><label>km</label><input id="fv" class="input" type="number" value="${r.distance||0}"></div>${saveFieldBtn(key)}`}
else if(key==='note'){html=`${pTitle('備考')}<textarea id="fv" class="input" style="min-height:130px" placeholder="自由記入">${r.note||''}</textarea>${saveFieldBtn(key)}`}
$('panel').innerHTML=html;$('drawer').classList.add('on')}
function pTitle(t){return `<div class="title">${t}</div><div class="sub" style="margin-bottom:12px">入力後、「反映する」を押してください。</div>`}
function saveFieldBtn(k){return `<button class="btn primary" style="width:100%" onclick="applyField('${k}',document.getElementById('fv').value)">反映する</button>`}
function choicePanel(title,key,current,arr,suffix){return `${pTitle(title)}<div class="chips" style="flex-wrap:wrap;overflow:visible">${arr.map(v=>`<button class="chip ${+current===v?'on':''}" onclick="applyField('${key}','${v}')">${v}${suffix}</button>`).join('')}</div><div class="field" style="margin-top:12px"><label>直接入力</label><input id="fv" class="input" type="number" step="0.5" value="${current||0}"></div>${saveFieldBtn(key)}`}
function applyField(key,val){let r=draft();let map={content:'content',labor:'labor',overtime:'overtime',night:'night',car:'car',distance:'distance',note:'note'};r[map[key]]= ['labor','overtime','night','car','distance'].includes(key)?Number(val):val;db.draft=r;db.dirty=true;save();closePanel();render();}
function openDate(){let days=Array.from({length:dim()},(_,i)=>i+1);$('panel').innerHTML=`<div class="title">日付を選択</div><div class="field"><label>日付</label><input class="input" type="date" value="${dayLabel()}" onchange="let p=this.value.split('-');db.month=p[0]+'-'+p[1];setDay(Number(p[2]));closePanel()"></div><div class="chips" style="flex-wrap:wrap;overflow:visible">${days.map(d=>`<button class="chip ${d===db.day?'on':''} ${entered().has(d)?'ok':''}" onclick="closePanel();setDay(${d})">${d}日</button>`).join('')}</div>`;$('drawer').classList.add('on')}
function openContext(){let j=job();$('panel').innerHTML=`<div class="title">現場を選択</div><div class="field"><label>現場</label><select id="ctx_job">${db.jobs.map(x=>`<option value="${x.id}" ${x.id===db.job?'selected':''}>${x.name}</option>`).join('')}</select></div><div class="field"><label>対象月</label><input id="ctx_month" class="input" type="month" value="${db.month}"></div><button class="btn primary" style="width:100%" onclick="db.job=$('ctx_job').value;db.month=$('ctx_month').value;db.draft=null;db.dirty=false;save();closePanel();render();toast('変更しました')">変更する</button>`;$('drawer').classList.add('on')}
function saveReport(){let r=draft();db.reports=db.reports.filter(x=>!(x.job===db.job&&x.day===db.day));db.reports.push({...r,day:db.day,job:db.job});db.dirty=false;db.draft=structuredClone({...r,day:db.day,job:db.job});save();toast('日報を保存しました');render()}
function copyPrev(){let p=rec(db.day-1);if(!p){toast('前日の入力がありません');return}db.draft={...structuredClone(p),day:db.day,job:db.job};db.dirty=true;save();toast('前日をコピーしました');render()}
function openList(){let rows=list().map(r=>`<div class="listRow" onclick="closePanel();setDay(${r.day})"><div><b>${r.day}</b></div><div class="truncate">${r.content||'作業内容なし'}</div><div>${r.labor}</div><div>${r.overtime||0}H</div></div>`).join('')||'<div class="empty">入力済みの日報がありません</div>';$('panel').innerHTML=`<div class="title">日報一覧</div><div class="sheetBox"><div class="listRow head"><div>日</div><div>作業内容</div><div>人工</div><div>残業</div></div>${rows}</div>`;$('drawer').classList.add('on')}
render();
</script>
</body>
</html>
